:root {
  --font-display: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;

}

}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--font-body);background:var(--color-bg);color:var(--color-text);-webkit-font-smoothing:antialiased;overflow-x:hidden;}

.nav.scrolled{background:var(--color-glass);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--color-border);box-shadow:var(--shadow-sm);}
.nav-inner{max-width:var(--content-max);margin:0 auto;height:100%;display:flex;align-items:center;justify-content:space-between;padding:0 var(--content-padding);}

.nav-link:hover{color:var(--color-text);background:var(--color-bg-secondary);}
.hero{min-height:92vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:120px var(--content-padding) 80px;position:relative;z-index:1;}
.hero-eyebrow{font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--color-accent);margin-bottom:16px;opacity:0;transform:translateY(12px);animation:rev .6s var(--ease-spring) .2s forwards;}
.hero-title{font-family:var(--font-display);font-size:clamp(48px,8vw,88px);font-weight:700;letter-spacing:-3px;line-height:1.05;margin-bottom:20px;opacity:0;transform:translateY(20px);animation:rev .8s var(--ease-spring) .35s forwards;}

.stat-number{font-family:var(--font-display);font-size:36px;font-weight:700;letter-spacing:-1px;background:linear-gradient(135deg,#1d1d1f,#0071e3);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

.about-content h2{font-family:var(--font-display);font-size:22px;font-weight:700;letter-spacing:-0.5px;margin-bottom:10px;}

.about-links{display:flex;gap:12px;flex-wrap:wrap;}
.about-link{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--color-accent);padding:6px 14px;border-radius:var(--radius-sm);border:1px solid var(--color-accent);transition:all .2s var(--ease-apple);}
.about-link:hover{background:var(--color-accent);color:#fff;}
.footer{border-top:1px solid var(--color-border);padding:32px var(--content-padding);position:relative;z-index:1;}
.footer-inner{max-width:var(--content-max);margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;}

.footer-copy a{color:var(--color-text-secondary);text-decoration:none;}

.footer-links{display:flex;gap:20px;}

.footer-link:hover{color:var(--color-text);}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:16px;}

@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:14px;color:var(--color-text-tertiary);}
@media(max-width:768px){.hero{padding:100px 20px 60px;}.hero-stats{gap:24px;}.stat-number{font-size:24px;}.post-card.featured{flex-direction:column;}.post-card.featured .post-img{width:100%;min-height:200px;border-radius:var(--radius-lg) var(--radius-lg) 0 0;}.post-card.featured .post-body{padding:24px;}.about-card{flex-direction:column;gap:20px;}.nav-links{display:none;}.footer-inner{flex-direction:column;text-align:center;}}

<script>
const nav=document.getElementById('nav');

const ARTICLES=[{"title": "日常", "link": "https://bishopsun1988.wordpress.com/2018/01/31/%e6%97%a5%e5%b8%b8/", "pub_date": "Wed, 31 Jan 2018", "slug": "post-31", "content": "<p>有时候经常会有一个疑问，某些微信好友一年到头可能不会发一条朋友圈，平时在微信群也不活跃，这种人群是怀着一种什么样的心理存在着。有听过网上一种说法，这种人群属于内心极度孤傲，外表冷酷。从内到外无时无刻不散发着一股让人几乎窒息的冷酷感，因而他自己的行为方式自然也就要符合他的这种酷感的形象。在他们心中，发布朋友圈透露自己日常，有违背他的个性。对于此种言辞，我个人不是完全赞同，但赞同的比率在百分之六十。平日工作时都会默默观察身边同事或者朋友，他们的行为习惯是否符合网上的言论，结果一半一半。</p>\n<p>但我想说，对于微信朋友圈这样的互动圈，每个人都有自己的权利和自由频繁发布动态，当然也有自由不发布。人各有志，生活方式也不尽相同。不一定是那种爱扮酷的人不更新朋友圈，反而有的爱耍酷的人更新频率奇高。</p>\n<p>最近我在想啊，自己是否可以慢慢淡化朋友圈的刷屏与更新，总感觉自己患有一种无可名状的病，专家称之为社交焦虑症，急迫想要知道微信好友都有什么日常更新，又多了什么广告，做代购的又撺掇引诱好友买买买。当刷朋友圈成为一种习惯时，不妙，我们已被手机俘虏。</p>\n<p>曾经有一段时间，心情无比低迷，遂更新一动态告知微信圈的好友，“本人最近有事打算关闭朋友圈，还望周知，勿念”，多么矫情的文字，现在读来恶心之至。当然也有好友发布过同样的，一般我的第一反应这人肯定是遇上事了，心情情绪低落，人在这种情况下大多会做出超出常态不可理喻的做法。此时我都会使用传统的短信方式问候该人，做一些心理劝导与安慰。</p>\n<p>说到朋友圈，不得不提及微信官方2017年推出的重磅功能，即可以设置朋友圈可查看历史时间，最短三天。功能一出，很多身边小伙伴选择该项，让人家看不到三天以上的动态，对于三天未发布任何动态的，点击进去，空空如也，访问者内心我想也是凉凉的吧。针对该功能，的确我们可以阻挡陌生人对你日常习惯的了解，但另一方面，对于亲密的好友，有种被拒之门外之感，不知有人可曾想过。有个恰当的比喻，你兴高采烈的来到朋友家玩，刚一进门被告知“不能进卧室”，只能呆客厅，此刻心情可想而知。</p>\n\t\t<div id=\"geo-post-32\" class=\"geo geo-post\" style=\"display: none\">\n\t\t\t<span class=\"latitude\">30.547735</span>\n\t\t\t<span class=\"longitude\">104.099966</span>", "excerpt": "有时候经常会有一个疑问，某些微信好友一年到头可能不会发一条朋友圈，平时在微信群也不活跃，这种人群是怀着一种什么样的心理存在着。有听过网上一种说法，这种人群属于内心极度孤傲，外表冷酷。从内到外无时无刻不散发着一股让人几乎窒息的冷酷感，因而他自己的行为方式自然也就要符合他的这种酷感的形象。在他们心中，发", "date": "Wed, 31 Ja"}, {"title": "小人国游记", "link": "https://bishopsun1988.wordpress.com/2020/08/19/%e5%b0%8f%e4%ba%ba%e5%9b%bd%e6%b8%b8%e8%ae%b0/", "pub_date": "Wed, 19 Aug 2020", "slug": "post-12", "content": "<div class=\"wp-block-image\"><figure class=\"aligncenter\"><img data-attachment-id=\"238\" data-permalink=\"https://bishopsun1988.wordpress.com/sample-jpg/\" data-orig-file=\"https://bishopsun1988.wordpress.com/wp-content/uploads/2020/08/sample.jpg\" data-orig-size=\"1070,535\" data-comments-opened=\"1\" data-image-meta=\"{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}\" data-image-title=\"\" data-image-description=\"\" data-image-caption=\"&lt;p&gt;格列佛游记&lt;/p&gt;\n\" data-large-file=\"https://bishopsun1988.wordpress.com/wp-content/uploads/2020/08/sample.jpg?w=660\" width=\"1070\" height=\"535\" src=\"https://bishopsun1988.wordpress.com/wp-content/uploads/2020/08/sample.jpg\" alt=\"格列佛游记\" class=\"wp-image-238\" srcset=\"https://bishopsun1988.wordpress.com/wp-content/uploads/2020/08/sample.jpg 1070w, https://bishopsun1988.wordpress.com/wp-content/uploads/2020/08/sample.jpg?w=150&amp;h=75 150w, https://bishopsun1988.wordpress.com/wp-content/uploads/2020/08/sample.jpg?w=300&amp;h=150 300w, https://bishopsun1988.wordpress.com/wp-content/uploads/2020/08/sample.jpg?w=768&amp;h=384 768w, https://bishopsun1988.wordpress.com/wp-content/uploads/2020/08/sample.jpg?w=1024&amp;h=512 1024w\" sizes=\"(max-width: 1070px) 100vw, 1070px\" /><figcaption>格列佛游记</figcaption></figure></div>\n\n\n\n<p class=\"wp-block-paragraph\">由于某些原因，我不便将我们在那一带海上历险的细枝末节来打扰读者，只说说下面这些情况就够了吧。在向东印度群岛行驶的途中，一阵猛烈的风暴把我们刮到了几迪门兰<sup><a id=\"ffn1\" href=\"#fn1\" class=\"footnote\">1</a></sup>的西北方。</p>\n\n\n\n<p class=\"wp-block-paragraph\">船员中有十二人因过度劳累及饮食恶劣而丧生，其余的人也都极度虚弱。十一月五日，当地正值初夏时节，海上大雾弥漫。水手们在离船不到半锚的地方发现了一座礁石，但由于风太大，我们被刮得直接撞到了礁石上去，船身立刻破裂。包括我在内的六名船员，把救生船放到了海里，都想竭力远离大船和礁石。据我估计，我们只划了约三里格远就划不动了，因为早在船上时我们大家都已精疲力尽了。于是，我们只好任凭波涛摆布。差不多半小时后，突然一阵狂风从北方吹来，将我们的小船一下子掀翻了。小船上的同伴，逃到礁石上的人及留在大船上的那些人之后的情况如何？我也不得而知；但我可以断定的是他们全都失踪了。至于我自己，也只能听天由命不断向前游着，任凭风浪推搡。我时不时用腿向下摸索，但无法触及海底；就在我无力挣扎、眼看就要完蛋的时候，我发现自己游到了水深至我头顶的地方。而此时，风暴也大大地减弱了。海底的斜坡很小，在走了差不多一英里后，我终于上岸了。我推测那时大约是晚上八点。我又继续向前走了快半英里，但仍没看到任何有关房屋和居民的迹象；至少我因为太虚弱而没观察到。我疲倦到了极点，由于天气炎热，外加离开大船前我又喝了约半品脱的白兰地，我彼时特别想睡觉。于是我在草地上顺势躺了下去，草很短也很软。我感觉我睡了在我有记忆以来最香甜的一觉。我估计自己睡了有九歌小时，因为当我醒来的时候，已经是白天了。</p>\n\n\n\n<p class=\"wp-block-paragraph\">我想站起来，却怎么也动弹不得。由于我恰好是仰天躺在草地上的，我发现自己的双臂和腿脚都被牢牢地固定到了地上；我又长又厚的头发也同样地被牢系在草地上了。从腋窝到大腿，我感觉自己的身体被一些细细的带子捆绑着。我只能朝上看。太阳开始热起来了，阳光刺痛了我的眼睛。我听到周围一片嘈杂声，但躺着的姿势使我除了天空其他什么也看不到。没过多久，我觉得有个活的东西在我左腿上蠕动，轻轻地向前，越过我的胸脯，几乎到了我的下巴那儿。我尽可能将眼睛往下看，我感到那有一个不到六英寸高，手持弓箭、背负箭袋的人型生物。与此同时，（我感觉）至少有四十多个他的同类跟在他身后。我大吃一惊，不断地大声吼叫着，吓得他们全都掉头跑了。我后来被告知，他们中有几个在从我身边往地上跳时受了伤。</p>\n\n\n\n<p class=\"wp-block-paragraph\">不过很快，他们就回来了，其中一个竟敢走到能看见我整张脸的地方，他兴高采烈地举起双手，抬起双眼，一副羡慕的样子，用刺耳却十分清晰的声音高喊着海琴那·德古尔：其他人也把这几个字重复了好几遍，但当时我并不明白那是什么意思。读者可以想象到，我一直那样躺着是非常不舒服的。最后，我极力挣脱。终于挣断了细绳，拔出了将我左臂固定在地上的木钉子；我把左臂举到面前，发现了他们捆绑我的方法。这时我猛地一拉，虽然很痛，但将捆绑我左边头发的细绳子稍微松了松，这样我就能将头转动两英寸左右了。</p>\n\n\n\n<p class=\"wp-block-paragraph\"><br>来源于：<a href=\"https://en.wikisource.org/wiki/Gulliver%27s_Travels\" title=\"格列佛游记\">格列佛游记-小人国游记</a></p>\n\n\n\n<ol class=\"wp-block-list\"><li id=\"fn1\">据观测，我们所处的位置是南纬三十度零二分。 <a href=\"#ffn1\">↩</a></li></ol>\n<span id=\"wordads-inline-marker\" style=\"display: none;\"></span><div id=\"jp-post-flair\" class=\"sharedaddy\">\n<div id='jp-relatedposts' class='jp-relatedposts' >\n\t<h3 class=\"jp-relatedposts-headline\"><em>相关</em></h3>\n</div></div>\t</div>\n\n\t\n<div class=\"author-info\">\n\t<h2 class=\"author-heading\">发布者</h2>\n\t<div class=\"author-avatar\">\n\t\t<img referrerpolicy=\"no-referrer\" alt='未知 的头像' src='https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=56&#038;d=identicon&#038;r=G' srcset='https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=56&#038;d=identicon&#038;r=G 1x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=84&#038;d=identicon&#038;r=G 1.5x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=112&#038;d=identicon&#038;r=G 2x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=168&#038;d=identicon&#038;r=G 3x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=224&#038;d=identicon&#038;r=G 4x' class='avatar avatar-56' height='56' width='56' decoding='async' />\t</div>\n\n\t<div class=\"author-description\">\n\t\t<h3 class=\"author-title\">Bishop</h3>\n\n\t\t<p class=\"author-bio\">\n\t\t\tLover of Books &amp; Journey &amp; Music\t\t\t<a class=\"author-link\" href=\"https://bishopsun1988.wordpress.com/author/bishopsun1988/\" rel=\"author\">\n\t\t\t\t查看 Bishop 发布的所有文章\t\t\t</a>\n\t\t</p>\n\n\t</div>\n</div>\n\n\t<footer class=\"entry-footer\">\n\t\t<span class=\"posted-on\"><span class=\"screen-reader-text\">发表于 </span><a href=\"https://bishopsun1988.wordpress.com/2020/08/19/%e5%b0%8f%e4%ba%ba%e5%9b%bd%e6%b8%b8%e8%ae%b0/\" rel=\"bookmark\"><time class=\"entry-date published updated\" datetime=\"2020-08-19T13:00:05+08:00\">2020-08-19</time></a></span><span class=\"byline\"><span class=\"screen-reader-text\">作者 </span><span class=\"author vcard\"><a class=\"url fn n\" href=\"https://bishopsun1988.wordpress.com/author/bishopsun1988/\">Bishop</a></span></span><span class=\"cat-links\"><span class=\"screen-reader-text\">分类 </span><a href=\"https://bishopsun1988.wordpress.com/category/%e6%97%a5%e8%ae%b0/\" rel=\"category tag\">日记</a></span>\t\t\t</footer>\n\n</article>\n\n<div id=\"comments\" class=\"comments-area\">\n\n\t\n\t\n\t\t<div id=\"respond\" class=\"comment-respond\">\n\t\t<h3 id=\"reply-title\" class=\"comment-reply-title\">留下评论 <small><a rel=\"nofollow\" id=\"cancel-comment-reply-link\" href=\"/2020/08/19/%e5%b0%8f%e4%ba%ba%e5%9b%bd%e6%b8%b8%e8%ae%b0/#respond\" style=\"display:none;\">取消回复</a></small></h3><form action=\"https://bishopsun1988.wordpress.com/wp-comments-post.php\" method=\"post\" id=\"commentform\" class=\"comment-form\">\n\n\n<div class=\"comment-form__verbum transparent\">", "excerpt": "由于某些原因，我不便将我们在那一带海上历险的细枝末节来打扰读者，只说说下面这些情况就够了吧。在向东印度群岛行驶的途中，一阵猛烈的风暴把我们刮到了几迪门兰1的西北方。 船员中有十二人因过度劳累及饮食恶劣而丧生，其余的人也都极度虚弱。十一月五日，当地正值初夏时节，海上大雾弥漫。水手们在离船不到半锚的地方", "date": "Wed, 19 Au"}, {"title": "而立之年前的自省", "link": "https://bishopsun1988.wordpress.com/2018/03/21/%e8%80%8c%e7%ab%8b%e4%b9%8b%e5%b9%b4%e5%89%8d%e7%9a%84%e8%87%aa%e7%9c%81/", "pub_date": "Tue, 20 Mar 2018", "slug": "post-27", "content": "<p>回首毕业这五六年，若说平平淡淡也不是，中间也经历了各种磨难与痛苦，有失恋带来的痛苦，也有丧母之痛，工作事业一直原地踏步，徘徊不前，工资待遇一直处于所在城市中底以下，没房没车没女朋友，终日浑浑噩噩，得过且过，勉强有个阅读的爱好，整日埋头于书里的世界，与现实脱轨严重，一心想要逃离喧嚣的城市，怎奈红尘嚣嚣，无法摆脱，更何况留下一老父亲，必须坚守其身边，父子终日相依为命。</p>\n<p>工作六年，换了三个工作，不得不说，目前工作是自己比较喜欢和满意的，但无奈薪资待遇增长极其缓慢，导致生活压力巨大，错过买房最佳时机，此时此刻，已无力买房，租房月租快抵得上月供，住房问题一日不解决，生活质量便永无提高。然而，一心想买二手房，怎奈始终无合适房源，且二手房手续繁杂首付太多，亲戚们抠抠索索，不肯相助，朋友皆有心无力，买房始终如雾里看花水中望月。</p>\n<p>最近看文章提到，一个人在一座城市里，获取最大幸福感的来源是有安乐之所，即一所属于自己的房子，唯有这样，哪怕每个月除掉月贷，所剩无几，勉强维持生活开销，但也可以“穷开心”。的确如此，租房五年的经历，慢慢体会到哪怕再穷，只要能有一间属于自己的住所，再拥有一个小小的兴趣爱好，比如看书、听歌、画画、手工等，生活也可以其乐融融。若假以时日，将兴趣爱好发展扩大，兴许还能带来一笔意外收入，解决自己低收入的窘境。写到这里，不得不说，自己一直没有下定决心去做这件事，比如狠心咬牙，不要太挑剔，选到一处合适的居所。</p>\n<p>我心目中理想的生活状态是这样，</p>\n<p>一处不太喧嚣的住所，可以不用太现代化，周边不要太多商业街以及市场，但附近一定要有公园，每天的晨跑可以在此完成。然后房间的摆设不用太华丽繁杂，讲究实用为主，力求简洁，客厅可以没有电视，但必须有一面墙，方便日后买一投影仪周末宅家里观看精选的电影，再配以千元内的立体音响。阳台必须要有，向阳方向，面积不用太大，能容纳一花盆架，摆上绿植，比如兰草、绿萝、多肉，然后放得下一摇椅，一小方桌。客厅一角必须是两立柜式书架，墙角最好，摆上宜家挪威风格立式台灯，再配上一舒适的椅子，每晚的夜读时光就在此完成。卧室有一活动衣柜，放得下自己仅有的衣物便足矣。但卧室一定得有书桌，尽量简单朴实，够放一台式电脑即可。</p>\n<p>&nbsp;</p>\n<span id=\"wordads-inline-marker\" style=\"display: none;\"></span><div id=\"jp-post-flair\" class=\"sharedaddy\">\n<div id='jp-relatedposts' class='jp-relatedposts' >\n\t<h3 class=\"jp-relatedposts-headline\"><em>相关</em></h3>\n</div></div>\t</div>\n\n\t\n<div class=\"author-info\">\n\t<h2 class=\"author-heading\">发布者</h2>\n\t<div class=\"author-avatar\">\n\t\t<img referrerpolicy=\"no-referrer\" alt='未知 的头像' src='https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=56&#038;d=identicon&#038;r=G' srcset='https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=56&#038;d=identicon&#038;r=G 1x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=84&#038;d=identicon&#038;r=G 1.5x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=112&#038;d=identicon&#038;r=G 2x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=168&#038;d=identicon&#038;r=G 3x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=224&#038;d=identicon&#038;r=G 4x' class='avatar avatar-56' height='56' width='56' decoding='async' />\t</div>\n\n\t<div class=\"author-description\">\n\t\t<h3 class=\"author-title\">Bishop</h3>\n\n\t\t<p class=\"author-bio\">\n\t\t\tLover of Books &amp; Journey &amp; Music\t\t\t<a class=\"author-link\" href=\"https://bishopsun1988.wordpress.com/author/bishopsun1988/\" rel=\"author\">\n\t\t\t\t查看 Bishop 发布的所有文章\t\t\t</a>\n\t\t</p>\n\n\t</div>\n</div>\n\n\t<footer class=\"entry-footer\">\n\t\t<span class=\"posted-on\"><span class=\"screen-reader-text\">发表于 </span><a href=\"https://bishopsun1988.wordpress.com/2018/03/21/%e8%80%8c%e7%ab%8b%e4%b9%8b%e5%b9%b4%e5%89%8d%e7%9a%84%e8%87%aa%e7%9c%81/\" rel=\"bookmark\"><time class=\"entry-date published\" datetime=\"2018-03-21T05:22:58+08:00\">2018-03-21</time><time class=\"updated\" datetime=\"2018-03-21T05:23:00+08:00\">2018-03-21</time></a></span><span class=\"byline\"><span class=\"screen-reader-text\">作者 </span><span class=\"author vcard\"><a class=\"url fn n\" href=\"https://bishopsun1988.wordpress.com/author/bishopsun1988/\">Bishop</a></span></span><span class=\"cat-links\"><span class=\"screen-reader-text\">分类 </span><a href=\"https://bishopsun1988.wordpress.com/category/%e6%97%a5%e8%ae%b0/\" rel=\"category tag\">日记</a>、<a href=\"https://bishopsun1988.wordpress.com/category/%e4%b8%aa%e4%ba%ba%e7%94%9f%e6%b4%bb/\" rel=\"category tag\">个人生活</a></span><span class=\"tags-links\"><span class=\"screen-reader-text\">标签 </span><a href=\"https://bishopsun1988.wordpress.com/tag/%e7%94%9f%e6%b4%bb/\" rel=\"tag\">生活</a>、<a href=\"https://bishopsun1988.wordpress.com/tag/%e9%9a%8f%e7%ac%94/\" rel=\"tag\">随笔</a>、<a href=\"https://bishopsun1988.wordpress.com/tag/%e6%84%9f%e6%82%9f/\" rel=\"tag\">感悟</a></span>\t\t\t</footer>\n\n</article>\n\n<div id=\"comments\" class=\"comments-area\">\n\n\t\n\t\n\t\t<div id=\"respond\" class=\"comment-respond\">\n\t\t<h3 id=\"reply-title\" class=\"comment-reply-title\">留下评论 <small><a rel=\"nofollow\" id=\"cancel-comment-reply-link\" href=\"/2018/03/21/%e8%80%8c%e7%ab%8b%e4%b9%8b%e5%b9%b4%e5%89%8d%e7%9a%84%e8%87%aa%e7%9c%81/#respond\" style=\"display:none;\">取消回复</a></small></h3><form action=\"https://bishopsun1988.wordpress.com/wp-comments-post.php\" method=\"post\" id=\"commentform\" class=\"comment-form\">\n\n\n<div class=\"comment-form__verbum transparent\">", "excerpt": "回首毕业这五六年，若说平平淡淡也不是，中间也经历了各种磨难与痛苦，有失恋带来的痛苦，也有丧母之痛，工作事业一直原地踏步，徘徊不前，工资待遇一直处于所在城市中底以下，没房没车没女朋友，终日浑浑噩噩，得过且过，勉强有个阅读的爱好，整日埋头于书里的世界，与现实脱轨严重，一心想要逃离喧嚣的城市，怎奈红尘嚣嚣", "date": "Tue, 20 Ma"}, {"title": "《围城》之困", "link": "https://bishopsun1988.wordpress.com/2020/01/14/%e3%80%8a%e5%9b%b4%e5%9f%8e%e3%80%8b%e4%b9%8b%e5%9b%b0/", "pub_date": "Tue, 14 Jan 2020", "slug": "post-22", "content": "<p class=\"wp-block-paragraph\">《围城》，这本被半个多世纪一直推崇的描述恋爱与婚姻的小说，终于花了一周时间慢慢品完。</p>\n\n\n\n<p class=\"wp-block-paragraph\">不得不说钱老的文笔的确很犀利，语言叙述诙谐幽默，同时又带有尖酸刻薄之气，我想这种语言特点对于刻画人物性格起到很大作用。</p>\n\n\n\n<p class=\"wp-block-paragraph\">辛楣是典型的幽默风趣之人，当然方鸿渐也带有这种性格特征。然而他们二者是有很大区别，前者深谙官场社交那一套，常能将人玩弄于鼓掌；而后者心思过于单纯，不懂那些勾心斗角的把戏，虽然留洋回来的博士文凭是假的，但他却羞于谈及此事，不像三闾大学的历史系主任韩学愈，能将假文凭侃侃而谈，自吹自擂，毫无羞耻可言。但辛楣对鸿渐的深刻友谊是很值得称赞的，起初因为将他作为情敌，待之刻薄、轻蔑，当二者成为“同情之人”后，却发现，原来鸿渐“不那么讨厌，只是没有多大用处”，先向高松年校长介绍鸿渐去三闾大学任教授教书，后又出谋划策，躲过大学里的各种阴招，最后又介绍到上海报馆任资料室主任一职，可见辛楣对鸿渐已经尽到朋友力所能及的事。当然二者这种关系多少也是导致鸿渐最后与孙小姐婚姻破裂的一个原因，一个女人是不喜欢自己深爱的男人始终听从于另一个男人的，尤其是通过对这两个男人对比，发现自己的男人是那么一无是处，处处受制，自然不会给他太多男人的尊严，然后与其处处斤斤计较。</p>\n\n\n\n<p class=\"wp-block-paragraph\">再谈谈鸿渐身边的几个女人，鲍小姐、苏小姐、唐小姐、孙小姐。</p>\n\n\n\n<p class=\"wp-block-paragraph\">鲍小姐是鸿渐回国船上邂逅的富家女，准确说是有未婚夫的有夫之妇。没谈过恋爱的鸿渐轻而易举就被这种性感丰满而奔放的女人俘获，看似风流的鸿渐注定拜倒于鲍小姐这种长期混迹于男人堆的女人。船到香港，二者风流之事便止于此。然而此处却是他与苏小姐开始的地方。</p>\n\n\n\n<p class=\"wp-block-paragraph\">苏小姐温文尔雅，知书达理，学富五车，饱读诗书，获得文学博士归国。这样的女人对于自己的爱情是不轻易施舍给他人的，然而对鸿渐，她却倾囊相授，甚至为得到鸿渐不惜施计阻挠鸿渐与唐小姐在一起。然而鸿渐起初对她是敬而远之，因为她太过高冷，好似冰山美人般无法企及。却曾未想她会爱上自己，可惜自己心系他人。终于在被逼无奈之下，一封信挑明关系，然而这次鸿渐可谓“赔了美人又折恋人”，走上了教书之旅，去邂逅另一段恋情。</p>\n\n\n\n<p class=\"wp-block-paragraph\">唐小姐清纯可人，活泼好动，初次相识便能让人产生好感，因此鸿渐与她初次见面便拜倒于石榴裙下。唐晓芙对方其实并没有多大的好感，只是一心想着与其表姐苏呕气，苏越是阻挠她越是要与方亲密无间，最终爱上了方，二者通信频繁，情话连绵，也算是有了一段值得一生回忆的恋爱。可惜最终苏将方有过未婚妻，与鲍有过风流往事，一一告知唐，他们的恋情宣告破灭，快速结束了这场浪漫之旅。</p>\n\n\n\n<p class=\"wp-block-paragraph\">孙小姐大学刚毕业，相貌平平，属于在一堆人里头不会成为焦点的人物。自然方对她是不会有多少好感。但孙小姐算是几个女人里心机最深的人，当她意识到自己爱上方时，她就做好准备伺机让方爱上她。可惜鸿渐啊，鸿渐，心思单纯如小孩般又一次陷入一场恋爱，同时走进了人生最艰难也最痛心的围城。二人恋爱不久，在回上海途中进入婚姻圣殿，此刻的鸿渐已经初步感受到了这座围城的艰与苦。他们间发生的争吵越来越多，也越来越频繁，而在回到上海后，面对亲戚，仆人，家人，朋友，各种生活琐碎小事面前，这种态势越演愈烈，最终闹得婚姻破裂，双方各自心如死灰。</p>\n\n\n\n<p class=\"wp-block-paragraph\">“围城”一词一直被很多人作为婚姻的替代词，诚如书中所说，&#8221;有的人想进去，而有的人想出来&#8221;，当今这个缺乏信任与安全感的社会，许多人对婚姻避而远之，越来越多的人在逃离，生怕一旦进入便伤的千疮百孔，遍体鳞伤，而不幸进去的人往往会因鸡毛蒜皮之事而设法逃出。</p>\n\n\n\n<p class=\"wp-block-paragraph\">到底我们该如何正视现代婚姻这座望而生畏的围城？没有人会给出正确的答案，围城之困，需要你我自己去切身体会，方能自我解围</p>\n<span id=\"wordads-inline-marker\" style=\"display: none;\"></span><div id=\"jp-post-flair\" class=\"sharedaddy\">\n<div id='jp-relatedposts' class='jp-relatedposts' >\n\t<h3 class=\"jp-relatedposts-headline\"><em>相关</em></h3>\n</div></div>\t</div>\n\n\t\n<div class=\"author-info\">\n\t<h2 class=\"author-heading\">发布者</h2>\n\t<div class=\"author-avatar\">\n\t\t<img referrerpolicy=\"no-referrer\" alt='未知 的头像' src='https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=56&#038;d=identicon&#038;r=G' srcset='https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=56&#038;d=identicon&#038;r=G 1x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=84&#038;d=identicon&#038;r=G 1.5x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=112&#038;d=identicon&#038;r=G 2x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=168&#038;d=identicon&#038;r=G 3x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=224&#038;d=identicon&#038;r=G 4x' class='avatar avatar-56' height='56' width='56' decoding='async' />\t</div>\n\n\t<div class=\"author-description\">\n\t\t<h3 class=\"author-title\">Bishop</h3>\n\n\t\t<p class=\"author-bio\">\n\t\t\tLover of Books &amp; Journey &amp; Music\t\t\t<a class=\"author-link\" href=\"https://bishopsun1988.wordpress.com/author/bishopsun1988/\" rel=\"author\">\n\t\t\t\t查看 Bishop 发布的所有文章\t\t\t</a>\n\t\t</p>\n\n\t</div>\n</div>\n\n\t<footer class=\"entry-footer\">\n\t\t<span class=\"posted-on\"><span class=\"screen-reader-text\">发表于 </span><a href=\"https://bishopsun1988.wordpress.com/2020/01/14/%e3%80%8a%e5%9b%b4%e5%9f%8e%e3%80%8b%e4%b9%8b%e5%9b%b0/\" rel=\"bookmark\"><time class=\"entry-date published\" datetime=\"2020-01-14T15:20:25+08:00\">2020-01-14</time><time class=\"updated\" datetime=\"2021-01-15T14:35:40+08:00\">2021-01-15</time></a></span><span class=\"byline\"><span class=\"screen-reader-text\">作者 </span><span class=\"author vcard\"><a class=\"url fn n\" href=\"https://bishopsun1988.wordpress.com/author/bishopsun1988/\">Bishop</a></span></span><span class=\"cat-links\"><span class=\"screen-reader-text\">分类 </span><a href=\"https://bishopsun1988.wordpress.com/category/%e4%b9%a6/\" rel=\"category tag\">书</a></span><span class=\"tags-links\"><span class=\"screen-reader-text\">标签 </span><a href=\"https://bishopsun1988.wordpress.com/tag/%e8%af%bb%e4%b9%a6%e7%ac%94%e8%ae%b0/\" rel=\"tag\">读书笔记</a></span>\t\t\t</footer>\n\n</article>\n\n<div id=\"comments\" class=\"comments-area\">\n\n\t\n\t\n\t\t<div id=\"respond\" class=\"comment-respond\">\n\t\t<h3 id=\"reply-title\" class=\"comment-reply-title\">留下评论 <small><a rel=\"nofollow\" id=\"cancel-comment-reply-link\" href=\"/2020/01/14/%e3%80%8a%e5%9b%b4%e5%9f%8e%e3%80%8b%e4%b9%8b%e5%9b%b0/#respond\" style=\"display:none;\">取消回复</a></small></h3><form action=\"https://bishopsun1988.wordpress.com/wp-comments-post.php\" method=\"post\" id=\"commentform\" class=\"comment-form\">\n\n\n<div class=\"comment-form__verbum transparent\">", "excerpt": "《围城》，这本被半个多世纪一直推崇的描述恋爱与婚姻的小说，终于花了一周时间慢慢品完。 不得不说钱老的文笔的确很犀利，语言叙述诙谐幽默，同时又带有尖酸刻薄之气，我想这种语言特点对于刻画人物性格起到很大作用。", "date": "Tue, 14 Ja"}, {"title": "大梦谁先觉？平生我自知。", "link": "https://bishopsun1988.wordpress.com/2020/03/03/%e5%a4%a7%e6%a2%a6%e8%b0%81%e5%85%88%e8%a7%89%ef%bc%9f%e5%b9%b3%e7%94%9f%e6%88%91%e8%87%aa%e7%9f%a5%e3%80%82/", "pub_date": "Tue, 03 Mar 2020", "slug": "post-21", "content": "<h3 class=\"wp-block-heading\">楔子</h3>\n\n\n\n<p class=\"wp-block-paragraph\"><strong>大梦谁先觉，平生我自知。</strong></p>\n\n\n\n<p class=\"wp-block-paragraph\"><strong>草堂春睡足，窗外日迟迟。</strong></p>\n\n\n\n<p class=\"wp-block-paragraph\">该句出自罗贯中《三国演义》里刘关张三顾茅庐一话中，犹记得刘关张三人在孔明屋舍小门外静静等着，直到孔明午睡醒来，醒来便吟诵着该诗。玄德公听罢，对卧龙先生的仰慕敬佩更添几分。</p>\n\n\n\n<p class=\"wp-block-paragraph\">然如今的我们，该如何去理解该诗？</p>\n\n\n\n<h2 class=\"wp-block-heading\">解疑</h2>\n\n\n\n<p class=\"wp-block-paragraph\">若要解读该诗，首先我们需要了解几个关键词的意思。</p>\n\n\n\n<h4 class=\"wp-block-heading\">“大梦”为何？</h4>\n\n\n\n<p class=\"wp-block-paragraph\">《庄子·齐物论》：“方其梦也，不知其梦也，梦之中又占其梦焉，觉而后知其梦也；且有大觉，而后知此其大梦也。”</p>\n\n\n\n<p class=\"wp-block-paragraph\">此处的大梦，指道家对人生的看法，一种思想境界，且一定是高境界。</p>\n\n\n\n<h4 class=\"wp-block-heading\">“谁先觉”</h4>\n\n\n\n<p class=\"wp-block-paragraph\">三个字道出，当今天下人皆浑噩混沌，庸庸碌碌，无人能参透这“大梦”。</p>\n\n\n\n<h4 class=\"wp-block-heading\">“平生”</h4>\n\n\n\n<p class=\"wp-block-paragraph\">该二字是何等的气魄，从时间跨度上，充分展示了孔明无比自信的姿态。</p>\n\n\n\n<h4 class=\"wp-block-heading\">“我自知”</h4>\n\n\n\n<p class=\"wp-block-paragraph\">此三字颇有“众人皆醉我独醒”屈夫子般的狂放，又有李太白“仰天大笑出门去，我辈岂是蓬蒿人”的不羁。是的，当今天下，能参透“大梦”者，独我一人，且向来也只有我一人。</p>\n\n\n\n<h4 class=\"wp-block-heading\">“草堂”</h4>\n\n\n\n<p class=\"wp-block-paragraph\">初见二字，第一反应是杜子美的“杜甫草堂”，清幽、雅静，然早他五百年，卧龙先生已早在草堂下修身养性，纵观天下，等待着自己的伯乐，以成其霸业。</p>\n\n\n\n<h4 class=\"wp-block-heading\">“日迟迟”</h4>\n\n\n\n<p class=\"wp-block-paragraph\">“日”字在此很有意思，一指草堂窗外的斜阳，二指其伯乐-刘皇叔。</p>\n\n\n\n<p class=\"wp-block-paragraph\">字面意思好似在描景，其背后影射之意却是，有一种埋怨之气，埋怨迟迟到来的伯乐，我孔明整日苦苦等待，你刘皇叔咋这么迟才到来呀？然，埋怨过后，终究等来了自己的伯乐，又有一种苦尽甘来、喜不自胜的喜悦。</p>\n\n\n\n<h2 class=\"wp-block-heading\">写在最后</h2>\n\n\n\n<p class=\"wp-block-paragraph\">三顾茅庐，古往今来，无人不反复提及，原因不外乎：</p>\n\n\n\n<p class=\"wp-block-paragraph\">其一，刘皇叔广纳贤才，重视人才，肯为求得贤才，不辞辛劳，且亲力亲为。孔明得遇明主，实属三生有幸。</p>\n\n\n\n<p class=\"wp-block-paragraph\">其二，侧面衬托孔明，智慧卓绝，当世英才，自比管仲乐毅，绝非无中生有，实至名归。</p>\n<span id=\"wordads-inline-marker\" style=\"display: none;\"></span><div id=\"jp-post-flair\" class=\"sharedaddy\">\n<div id='jp-relatedposts' class='jp-relatedposts' >\n\t<h3 class=\"jp-relatedposts-headline\"><em>相关</em></h3>\n</div></div>\t</div>\n\n\t\n<div class=\"author-info\">\n\t<h2 class=\"author-heading\">发布者</h2>\n\t<div class=\"author-avatar\">\n\t\t<img referrerpolicy=\"no-referrer\" alt='未知 的头像' src='https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=56&#038;d=identicon&#038;r=G' srcset='https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=56&#038;d=identicon&#038;r=G 1x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=84&#038;d=identicon&#038;r=G 1.5x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=112&#038;d=identicon&#038;r=G 2x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=168&#038;d=identicon&#038;r=G 3x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=224&#038;d=identicon&#038;r=G 4x' class='avatar avatar-56' height='56' width='56' decoding='async' />\t</div>\n\n\t<div class=\"author-description\">\n\t\t<h3 class=\"author-title\">Bishop</h3>\n\n\t\t<p class=\"a a6%e8%b0%81%e5%85%88%e8%a7%89%ef%bc%9f%e5%b9%b3%e7%94%9f%e6%88%91%e8%87%aa%e7%9f%a5%e3%80%82/?replytocom=12#respond\" data-commentid=\"12\" data-postid=\"124\" data-belowelement=\"div-comment-12\" data-respondelement=\"respond\" data-replyto=\"回复给health insurance premium calculator\" aria-label=\"回复给health insurance premium calculator\">回复</a></div>\t\t\t</article>\n\t\t</li>\n\t\t</ol>\n\n\t\t\n\t\n\t\n\t\t<div id=\"respond\" class=\"comment-respond\">\n\t\t<h3 id=\"reply-title\" class=\"comment-reply-title\">留下评论 <small><a rel=\"nofollow\" id=\"cancel-comment-reply-link\" href=\"/2020/03/03/%e5%a4%a7%e6%a2%a6%e8%b0%81%e5%85%88%e8%a7%89%ef%bc%9f%e5%b9%b3%e7%94%9f%e6%88%91%e8%87%aa%e7%9f%a5%e3%80%82/#respond\" style=\"display:none;\">取消回复</a></small></h3><form action=\"https://bishopsun1988.wordpress.com/wp-comments-post.php\" method=\"post\" id=\"commentform\" class=\"comment-form\">\n\n\n<div class=\"comment-form__verbum transparent\">", "excerpt": "大梦谁先觉，平生我自知。 草堂春睡足，窗外日迟迟。", "date": "Tue, 03 Ma"}, {"title": "淘书记续", "link": "https://bishopsun1988.wordpress.com/2018/05/31/%e6%b7%98%e4%b9%a6%e8%ae%b0%e7%bb%ad/", "pub_date": "Thu, 31 May 2018", "slug": "post-25", "content": "<ul>\n<li>写在前面的话</li>\n</ul>\n<p>为了方便成都“书迷”们淘书，决定制作一份成都淘书地图，上次去了送仙桥古玩交易市场，此次先后去了成都古玩交易市场第五街，也就是高升桥罗马广场，冲着网友推荐的淘书斋与芥子书店去。紧接着是府青立交玛塞城古玩收藏市场，这地方网上很少或者从未提及，算是一个小更新。</p>\n<p>好了，开始此次淘书之旅吧。</p>\n<ul>\n<li>成都古玩交易市场第五街</li>\n</ul>\n<p>原本上周约定一朋友也是铁杆书迷共同此次的淘书之旅，怎奈有事，只能我独自出行，不过还是有惊喜，随后讲。本人家住中和，所以早早定好出行时间与公交线路，其实同去送仙桥路线完全一致，只不过时间稍微短点。早上八点打点好一切，鉴于上次手提一大捆书累得够呛，此次背上双肩包，希冀满载而归。同时，带着上次淘回的《上尉的女儿》在公交车上打发时间。不得不说，有本书在手上，一个半小时的车程，变得不再枯燥漫长。只是，现在坐在公交或地铁上手捧一本实体书阅读，总会被人觉得在装x，不禁感叹时代的变化，看书都被遭歧视。</p>\n<p>来到罗马广场，也就是此次的第一个目的地，一眼望去，全是古玩摊贩，金石玉器，古币旧钞，书画墨宝，壮观之甚。沿着街道小巷，一条条慢慢寻找，偶尔能看到商贩有卖旧书，但量稀少，主要还是以古玩为主。好不容易看到一着藏袍的人摆了二十来本旧书，发现了冯梦龙的《警世通言》，而且上一位购书者用书皮给包着，用毛笔在封面写上书名、作者与出版社，可见珍惜得很，虽然是福建人民出版社出版，不是我中意的出版社，但冲着这股惜书爱书的劲头，毫不犹豫收入囊中，且老板开价极其公道。带着好玩的心态，短暂停留于各个古玩摊前，听着卖家与摊贩的生意经，一个个架势上都不认输，卖家自备鉴别工具，如放大镜，查看各古玩的裂缝以及蛛丝马迹，以求在真假鉴别和讨价还价中提供较好的砍价理由。脑中闪现马亲王《古董局中局》里的各种交易情节，当然也想到里面贯穿始终的一句话“鉴古容易鉴人难”。可叹我等连基本的鉴古还未入门，更何谈鉴人。兜兜转转三条街，大大小小的门市，琳琅满目，但始终看不到淘书斋与芥子书店。心中开始产生怀疑是否已搬走。在穿过最后一条巷子后，总算看到一家店堆满了旧书，但没有招牌，门上也贴着“门市转让”，根据网友提供的照片看来，这便是淘书斋无疑。只是感叹不多久该店也会转让了。进入店内，看见的不是我预想的七十几岁老者，而是一中年，先不管，自己开始淘书，顺便给朋友发了所谓的“淘书直播”照片，然后大概讲了现场情况，没想到该友冲动异常，直接从新都开车过来，让我等着。啊，淘书的乐趣只有真正爱书之人才懂得吧，为其冲动也毫无关系。</p>\n<p>该店子不大，最多二十来平，但书架很高，一面墙摆得满满，总共五层，最上层都是大部头书籍，比如《史记》、四大名著、各朝代历史演义等。进门最右侧整面墙历史文献资料占据大半，最下两层有古代文学丛书，明清小说以及国学。紧接着店中间两排主要是地方志、历史游记，也包括古代明清小说，工具用书，比如辞典辞海啊，明显该店分类不清，比较杂乱，自己只得一本本慢慢看过去，选过去。老板背后一面墙全是有些年头的线装古籍，且隔着一玻璃柜，我在想，那样放着是做展示用吧，完全没法挑选，尽管那些古籍的确很贵，一般人不会买，毕竟我等不是做古籍收藏，回头又一想，应该是害怕翻阅的人多了，容易损坏，品相贬值，价值随之下降颇多。呆了差不多俩小时，逛遍所有书架，没找到最中意的书籍，心里很是烦躁，最后选了一本偏冷门的《一层楼》，作者为19世纪内蒙作家尹湛纳希，甲乙木译，估计大部分人都未曾听过此书此人，有兴趣者可以上网搜索，暂不赘述。付钱间隙，询问老板那位七十几岁的老者，原来搬去了玛塞城，且是他们在成都的旗舰店，朋友与我都未挑选到中意的书，心有不甘，遂决定驱车前往玛塞城。</p>\n<ul>\n<li>玛塞城古玩收藏交易市场</li>\n</ul>\n<p>兜兜转转了半小时来到玛塞城，此处其实就是一高档小区中心，负一楼被开发为古玩收藏交易市场。进入里面，冷清异常，大概是我们来的时间太晚，下午两点多，很多商家打烊或者直接未开门做生意，经过一老大爷介绍，此处每周二、四、六开市，一早许多摊贩在此摆摊贩售古玩旧书，我们来得并不是时候。而且据说是为了跟送仙桥错开（送仙桥每周三、日开市），想来成都淘书者是可以一周都有地儿淘书的，只需把握好时间。转了十来分钟，发现几个书店和摊贩，比如缥缃书局（经后来孔夫子网站查询，成都口碑排行榜前五），芥子书店，以及我们目标中的淘书斋。淘书斋比我想象中的大太多（废话，这可是人家的旗舰店），看店者为老爷子的孙子，老爷子在隔壁午休。店里藏书种类丰富，小到旧书刊杂志及小人书，大到线装古籍。我等俗人，没有太高雅的癖好，择一本《豆棚闲话》，以及全套《说岳全传》，皆出版于上海古籍出版社。本想淘网格本杨绛所译的《堂吉诃德》，遍寻无果，看来此次与该书无缘，留作下次吧。</p>\n<ul>\n<li>感慨</li>\n</ul>\n<p>淘书讲求书缘，有缘，遇上了，则不惜重金购之。无缘，勿强求，坚信未来可期。</p>\n<span id=\"wordads-inline-marker\" style=\"display: none;\"></span><div id=\"jp-post-flair\" class=\"sharedaddy\">\n<div id='jp-relatedposts' class='jp-relatedposts' >\n\t<h3 class=\"jp-relatedposts-headline\"><em>相关</em></h3>\n</div></div>\t</div>\n\n\t\n<div class=\"author-info\">\n\t<h2 class=\"author-heading\">发布者</h2>\n\t<div class=\"author-avatar\">\n\t\t<img referrerpolicy=\"no-referrer\" alt='未知 的头像' src='https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=56&#038;d=identicon&#038;r=G' srcset='https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=56&#038;d=identicon&#038;r=G 1x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=84&#038;d=identicon&#038;r=G 1.5x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=112&#038;d=identicon&#038;r=G 2x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=168&#038;d=identicon&#038;r=G 3x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=224&#038;d=identicon&#038;r=G 4x' class='avatar avatar-56' height='56' width='56' decoding='async' />\t</div>\n\n\t<div class=\"author-description\">\n\t\t<h3 class=\"author-title\">Bishop</h3>\n\n\t\t<p class=\"author-bio\">\n\t\t\tLover of Books &amp; Journey &amp; Music\t\t\t<a class=\"author-link\" href=\"https://bishopsun1988.wordpress.com/author/bishopsun1988/\" rel=\"author\">\n\t\t\t\t查看 Bishop 发布的所有文章\t\t\t</a>\n\t\t</p>\n\n\t</div>\n</div>\n\n\t<footer class=\"entry-footer\">\n\t\t<span class=\"posted-on\"><span class=\"screen-reader-text\">发表于 </span><a href=\"https://bishopsun1988.wordpress.com/2018/05/31/%e6%b7%98%e4%b9%a6%e8%ae%b0%e7%bb%ad/\" rel=\"bookmark\"><time class=\"entry-date published\" datetime=\"2018-05-31T11:29:21+08:00\">2018-05-31</time><time class=\"updated\" datetime=\"2018-11-14T11:30:06+08:00\">2018-11-14</time></a></span><span class=\"byline\"><span class=\"screen-reader-text\">作者 </span><span class=\"author vcard\"><a class=\"url fn n\" href=\"https://bishopsun1988.wordpress.com/author/bishopsun1988/\">Bishop</a></span></span><span class=\"cat-links\"><span class=\"screen-reader-text\">分类 </span><a href=\"https://bishopsun1988.wordpress.com/category/%e6%97%a5%e8%ae%b0/\" rel=\"category tag\">日记</a>、<a href=\"https://bishopsun1988.wordpress.com/category/%e4%b8%aa%e4%ba%ba%e7%94%9f%e6%b4%bb/\" rel=\"category tag\">个人生活</a>、<a href=\"https://bishopsun1988.wordpress.com/category/%e4%b9%a6/\" rel=\"category tag\">书</a></span><span class=\"tags-links\"><span class=\"screen-reader-text\">标签 </span><a href=\"https://bishopsun1988.wordpress.com/tag/%e7%8e%9b%e5%a1%9e%e5%9f%8e/\" rel=\"tag\">玛塞城</a>、<a href=\"https://bishopsun1988.wordpress.com/tag/%e7%bd%97%e9%a9%ac%e5%b9%bf%e5%9c%ba/\" rel=\"tag\">罗马广场</a>、<a href=\"https://bishopsun1988.wordpress.com/tag/%e6%88%90%e9%83%bd/\" rel=\"tag\">成都</a>、<a href=\"https://bishopsun1988.wordpress.com/tag/%e6%b7%98%e4%b9%a6%e8%ae%b0/\" rel=\"tag\">淘书记</a></span>\t\t\t</footer>\n\n</article>\n\n<div id=\"comments\" class=\"comments-area\">\n\n\t\n\t\n\t\t<div id=\"respond\" class=\"comment-respond\">\n\t\t<h3 id=\"reply-title\" class=\"comment-reply-title\">留下评论 <small><a rel=\"nofollow\" id=\"cancel-comment-reply-link\" href=\"/2018/05/31/%e6%b7%98%e4%b9%a6%e8%ae%b0%e7%bb%ad/#respond\" style=\"display:none;\">取消回复</a></small></h3><form action=\"https://bishopsun1988.wordpress.com/wp-comments-post.php\" method=\"post\" id=\"commentform\" class=\"comment-form\">\n\n\n<div class=\"comment-form__verbum transparent\">", "excerpt": "为了方便成都“书迷”们淘书，决定制作一份成都淘书地图，上次去了送仙桥古玩交易市场，此次先后去了成都古玩交易市场第五街，也就是高升桥罗马广场，冲着网友推荐的淘书斋与芥子书店去。紧接着是府青立交玛塞城古玩收藏市场，这地方网上很少或者从未提及，算是一个小更新。", "date": "Thu, 31 Ma"}, {"title": "《旅行与读书》摘录", "link": "https://bishopsun1988.wordpress.com/2020/04/30/%e4%b9%a6%e6%91%98/", "pub_date": "Thu, 30 Apr 2020", "slug": "post-16", "content": "<blockquote><p>本书书摘：</p>\n<p>我们所想见到的总是在我们所能见到的现实场景中变得平庸和黯淡，因为我们焦虑将来而不能专注于现在，而且我们对美的欣赏还受制于复杂的物质需要和心理欲求。<br />\n如果我们在加油站，还有汽车旅馆等地方发现了生活的诗意，如果我们为机场河火车车厢所吸引，其原因也许是我们明确地感觉到这些偏僻孤立的地方给我们提供了一种实实在在的场景，使我们能暂时摆脱因循僵滞的日常生活中难以改易的种种自私的安逸、种种陋习和拘囿，不管它们在设计上是如何的不完美、不舒适，在色彩上是如何的不含蓄，在灯光上是如何的不柔和。<br />\n艺术不可能完全凭借自身力量创造热情，也不可能是从凡人所缺乏的情感中产生，它只是推波助澜，诱发出更深刻的感受，使我们不至于因匆忙和随意而变得麻木。<br />\n对旅行的艺术的研究可能在一定意义上（也许是微不足道的）帮助人们理解希腊哲人所谓的“由理性支配的积极生活所带来的幸福”（eudaimonia）或人类昌盛。<br />\n旅行能催人思索。很少地方比在行进中的飞机、轮船和火车上更容易让人倾听到内心的声音。我们眼前的景观同我们脑子里可能产生的想法之间存在着某种奇妙的关联：宏阔的思考常常需要有壮阔的景观，而新的观点往往也产生于陌生的所在。在流动景观的刺激下，那些原本容易停顿的内心求索可以不断深进。</p></blockquote>\n<span id=\"wordads-inline-marker\" style=\"display: none;\"></span><div id=\"jp-post-flair\" class=\"sharedaddy\">\n<div id='jp-relatedposts' class='jp-relatedposts' >\n\t<h3 class=\"jp-relatedposts-headline\"><em>相关</em></h3>\n</div></div>\t</div>\n\n\t\n<div class=\"author-info\">\n\t<h2 class=\"author-heading\">发布者</h2>\n\t<div class=\"author-avatar\">\n\t\t<img referrerpolicy=\"no-referrer\" alt='未知 的头像' src='https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=56&#038;d=identicon&#038;r=G' srcset='https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=56&#038;d=identicon&#038;r=G 1x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=84&#038;d=identicon&#038;r=G 1.5x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=112&#038;d=identicon&#038;r=G 2x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=168&#038;d=identicon&#038;r=G 3x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=224&#038;d=identicon&#038;r=G 4x' class='avatar avatar-56' height='56' width='56' decoding='async' />\t</div>\n\n\t<div class=\"author-description\">\n\t\t<h3 class=\"author-title\">Bishop</h3>\n\n\t\t<p class=\"author-bio\">\n\t\t\tLover of Books &amp; Journey &amp; Music\t\t\t<a class=\"author-link\" href=\"https://bishopsun1988.wordpress.com/author/bishopsun1988/\" rel=\"author\">\n\t\t\t\t查看 Bishop 发布的所有文章\t\t\t</a>\n\t\t</p>\n\n\t</div>\n</div>\n\n\t<footer class=\"entry-footer\">\n\t\t<span class=\"posted-on\"><span class=\"screen-reader-text\">发表于 </span><a href=\"https://bishopsun1988.wordpress.com/2020/04/30/%e4%b9%a6%e6%91%98/\" rel=\"bookmark\"><time class=\"entry-date published\" datetime=\"2020-04-30T12:10:02+08:00\">2020-04-30</time><time class=\"updated\" datetime=\"2021-01-15T14:43:27+08:00\">2021-01-15</time></a></span><span class=\"byline\"><s <a href=\"https://bishopsun1988.wordpress.com/category/%e6%97%a5%e8%ae%b0/\" rel=\"category tag\">日记</a></span>\t\t\t</footer>\n\n</article>\n\n<div id=\"comments\" class=\"comments-area\">\n\n\t\n\t\n\t\t<div id=\"respond\" class=\"comment-respond\">\n\t\t<h3 id=\"reply-title\" class=\"comment-reply-title\">留下评论 <small><a rel=\"nofollow\" id=\"cancel-comment-reply-link\" href=\"/2021/01/28/%e7%9f%a5%e4%b9%8e%e5%a5%bd%e7%89%a9sop/#respond\" style=\"display:none;\">取消回复</a></small></h3><form action=\"https://bishopsun1988.wordpress.com/wp-comments-post.php\" method=\"post\" id=\"commentform\" class=\"comment-form\">\n\n\n<div class=\"comment-form__verbum transparent\">", "excerpt": "Lover of Books &amp; Journey &amp; Music\t\t\t\n\t\t\t\t查看 Bishop 发布的所有文章", "date": "Thu, 28 Ja"}, {"title": "新时期文学派别介绍", "link": "https://bishopsun1988.wordpress.com/2020/04/24/%e6%96%b0%e6%97%b6%e6%9c%9f%e6%96%87%e5%ad%a6%e6%b4%be%e5%88%ab%e4%bb%8b%e7%bb%8d/", "pub_date": "Thu, 23 Apr 2020", "slug": "post-19", "content": "<h2 class=\"wp-block-heading\">伤痕文学</h2>\n\n\n\n<h3 class=\"wp-block-heading\">背景介绍</h3>\n\n\n\n<p class=\"wp-block-paragraph\">伤痕文学是20世纪70年代末到80年代初在中国大陆文坛占据主导地位的一种文学现象。它得名于卢新华以“文革”中知青生活为题材的短篇小说《伤痕》。</p>\n\n\n\n<p class=\"wp-block-paragraph\">十年文革期间，无数知识青年被卷入了上山下乡运动中。“伤痕文学”的出现直接起因于上山下乡，它主要描述了知青、知识分子，受迫害官员及城乡普通民众在那个不堪回首的年代悲剧性的遭遇。</p>\n\n\n\n<h3 class=\"wp-block-heading\">代表人物及其作品</h3>\n\n\n\n<p class=\"wp-block-paragraph\">《班主任》/刘心武<br>《窗口》/王余九<br>《伤痕》/卢新华<br>《灵与肉》/张贤亮<br>《爬满青藤的木屋》/古华<br>《思念你，桦林！》袭巧明<br>《飘逝的花头巾》/陈建功<br>《被爱情遗忘的角落》/张弦<br>《本次列车终点》/王安忆<br>《我是谁》/宗璞<br>《啊!》/冯骥才<br>《大墙下的红玉兰》从维熙<br>《将军吟》莫应丰<br>《芙蓉镇》古华<br>《许茂和他的女儿们》周克芹<br>《走出迷惘》辛北</p>\n\n\n\n<h3 class=\"wp-block-heading\">影响及意义</h3>\n\n\n\n<p class=\"wp-block-paragraph\">伤痕文学的问世标志着新时期文学的开端。它是觉醒了的一代人对刚刚逝去的噩梦般的反常的苦难年代的强烈控诉。伤痕文学的作者们以清醒、真诚的态度关注、思考生活的真实，直面惨痛的历史，在他们的作品中呈现了一幅幅十年浩劫时期的生活图景。彻底否定“文化大革命”，这就是伤痕文学的精神实质。</p>\n\n\n\n<p class=\"wp-block-paragraph\">伤痕文学可以说是中国当代文学史上的第一个悲剧高潮。在思想上，它对彻底否定文化大革命作出了历史性的贡献；在艺术上，它第一次给当代文坛带来悲剧意识。这一意识可以说是新时期文学的“原色”之一，其整个文学时期的悲凉格调也由此而出。这便是伤痕文学在中国当代文学史上的意义所在。</p>\n\n\n<span id=\"wordads-inline-marker\" style=\"display: none;\"></span><div id=\"jp-post-flair\" class=\"sharedaddy\">\n<div id='jp-relatedposts' class='jp-relatedposts' >\n\t<h3 class=\"jp-relatedposts-headline\"><em>相关</em></h3>\n</div>", "excerpt": "伤痕文学是20世纪70年代末到80年代初在中国大陆文坛占据主导地位的一种文学现象。它得名于卢新华以“文革”中知青生活为题材的短篇小说《伤痕》。 十年文革期间，无数知识青年被卷入了上山下乡运动中。“伤痕文学”的出现直接起因于上山下乡，它主要描述了知青、知识分子，受迫害官员及城乡普通民众在那个不堪回首的", "date": "Thu, 23 Ap"}, {"title": "艳遇图书馆", "link": "https://bishopsun1988.wordpress.com/2021/01/15/%e8%89%b3%e9%81%87%e5%9b%be%e4%b9%a6%e9%a6%86/", "pub_date": "Thu, 14 Jan 2021", "slug": "post-9", "content": "<p>第一站：布拉格的轻与重<br />\n◦   人：小说主人公托马斯、特瑞萨，米兰昆德拉，卡夫卡<br />\n◦   书：米兰昆德拉《不能承受的生命之轻》，《曼娜回忆录》<br />\n◦   音乐：斯美塔娜《伏尔塔瓦河》，Jay《布拉格广场》<br />\n◦   电影：《布拉格之恋》<br />\n◦   摘录：<br />\n▪   布拉格的妥协精神，为了保存古老的城市建筑，面临侵略者，宁愿投降，不愿抵抗<br />\n▪   《不》中关于性的描写，“你做爱就像个知识分子”，性友谊</p>\n<p>第二站：北京，那些阳光灿烂的日子<br />\n◦   书：王朔《动物凶猛》<br />\n◦   人：米兰，马军，以及王朔，发生在北京部队大院的故事<br />\n◦   音乐：马斯卡尼《乡村骑士》<br />\n◦   电影：姜文《阳光灿烂的日子》<br />\n◦   摘录：<br />\n▪   过分清汤的女人和过分精致的男人都是乏味的<br />\n▪   西餐里的奶油浓汤-女人</p>\n<p>第三站：香港,似是故人来<br />\n◦   书：刘以鬯《酒徒》《迷楼》《对倒》<br />\n◦   人：梅艳芳、张国荣、王家卫<br />\n◦   音乐：梅艳芳《似是故人来》<br />\n◦   电影：《酒徒》《花样年华》《胭脂扣》<br />\n◦   摘录：</p>\n<p>第四站：在纽约，遇见苏珊•桑塔格<br />\n◦   书：《New Yorker》<br />\n◦   人：利比怀特，苏珊桑塔格，伍迪艾伦<br />\n◦   音乐：《We are the world》<br />\n◦   电影：<br />\n◦   摘录：<br />\n▪   Strand 书店，全球最大的二手书店</p>\n<span id=\"wordads-inline-marker\" style=\"display: none;\"></span><div id=\"jp-post-flair\" class=\"sharedaddy\">\n<div id='jp-relatedposts' class='jp-relatedposts' >\n\t<h3 class=\"jp-relatedposts-headline\"><em>相关</em></h3>\n</div></div>\t</div>\n\n\t\n<div class=\"author-info\">\n\t<h2 class=\"author-heading\">发布者</h2>\n\t<div class=\"author-avatar\">\n\t\t<img referrerpolicy=\"no-referrer\" alt='未知 的头像' src='https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=56&#038;d=identic l=\"tag\">艳遇图书馆</a>、<a href=\"https://bishopsun1988.wordpress.com/tag/%e8%ae%b8%e7%9f%a5%e8%bf%9c/\" rel=\"tag\">许知远</a>、<a href=\"https://bishopsun1988.wordpress.com/tag/%e6%92%ad%e5%ae%a2/\" rel=\"tag\">播客</a></span>\t\t\t</footer>\n\n</article>\n\n<div id=\"comments\" class=\"comments-area\">\n\n\t\n\t\n\t\t<div id=\"respond\" class=\"comment-respond\">\n\t\t<h3 id=\"reply-title\" class=\"comment-reply-title\">留下评论 <small><a rel=\"nofollow\" id=\"cancel-comment-reply-link\" href=\"/2021/01/15/%e8%89%b3%e9%81%87%e5%9b%be%e4%b9%a6%e9%a6%86/#respond\" style=\"display:none;\">取消回复</a></small></h3><form action=\"https://bishopsun1988.wordpress.com/wp-comments-post.php\" method=\"post\" id=\"commentform\" class=\"comment-form\">\n\n\n<div class=\"comment-form__verbum transparent\">", "excerpt": "第一站：布拉格的轻与重\n◦   人：小说主人公托马斯、特瑞萨，米兰昆德拉，卡夫卡\n◦   书：米兰昆德拉《不能承受的生命之轻》，《曼娜回忆录》\n◦   音乐：斯美塔娜《伏尔塔瓦河》，Jay《布拉格广场》\n◦   电影：《布拉格之恋》\n◦   摘录：\n▪   布拉格的妥协精神，为了保存古老的城市建筑，", "date": "Thu, 14 Ja"}, {"title": "关于“个人护城河”", "link": "https://bishopsun1988.wordpress.com/2020/10/02/%e5%85%b3%e4%ba%8e%e4%b8%aa%e4%ba%ba%e6%8a%a4%e5%9f%8e%e6%b2%b3/", "pub_date": "Thu, 01 Oct 2020", "slug": "post-10", "content": "<p class=\"wp-block-paragraph\"><strong>什么是个人护城河？</strong></p>\n\n\n\n<p class=\"wp-block-paragraph\">你拥有别人没有的竞争优势，可以是工作上某方面的技能，也可能是生活中的技能，且这种优势可以累积，随着时间不断增长，从而你的不可取代性会更强。</p>\n\n\n\n<p class=\"wp-block-paragraph\"><strong>如何建立或者说找到个人护城河？</strong></p>\n\n\n\n<p class=\"wp-block-paragraph\">你可以问自己：对我来说，什么事情容易做，而对别人却很难？我所拥有的技能中，哪些是其他人模仿会非常困难的？或者，你所爱的、擅长的事物，跟社会需要的事物有什么交汇点？</p>\n\n\n\n<p class=\"wp-block-paragraph\">护城河会随着条件的变化而变化。比如，录音技术诞生之前，稀缺的是音乐本身，你想听音乐，就需要有一个艺术家给你现场表演。现在，音乐录音到处都是，稀缺的是策划、发行和个性的展示。</p>\n\n\n\n<p class=\"wp-block-paragraph\">同样地，在社会中，以前的稀缺资源是金钱和特殊关系。而在互联网时代，稀缺的是特定知识和某些稀有技能。</p>\n\n\n\n<p class=\"wp-block-paragraph\">漫画家斯科特·亚当斯（Scott Adams）曾经提过一种建立个人护城河的方法，就是找到自己最擅长的2个～3个事物的交集。比如，他既不是最好的漫画家，也不是最好的作家，也不是最好的企业家，但他可以是最好的商业类漫画短文作者，这就是他的护城河。</p>\n\n\n\n<p class=\"wp-block-paragraph\">总之，你要发现对你来说容易而对他人却很难的事物，并在这些事物上变得出色，然后利用它来积累社会和金融资本。</p>\n\n\n\n<p class=\"wp-block-paragraph\">原文参考：/<a rel=\"noreferrer noopener\" href=\"https://eriktorenberg.substack.com/p/build-personal-moats\" target=\"_blank\">https://eriktorenberg.substack.com/p/build-personal-moats</a></p>\n\n\n\n<div class=\"wp-block-jetpack-contact-info\">\n<p class=\"wp-block-paragraph\"></p>\n</div>\n\n\n\n<p class=\"wp-block-paragraph\"></p>\n<span id=\"wordads-inline-marker\" style=\"display: none;\"></span><div id=\"jp-post-flair\" class=\"sharedaddy\">\n<div id='jp-relatedposts' class='jp-relatedposts' >\n\t<h3 class=\"jp-relatedposts-headline\"><em>相关</em></h3>\n</div></div>\t</div>\n\n\t\n<div class=\"author-info\">\n\t<h2 class=\"author-heading\">发布者</h2>\n\t<div class=\"author-avatar\">\n\t\t<img referrerpolicy=\"no-referrer\" alt='未知 的头像' src='https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=56&#038;d=identicon&#038;r=G' srcset='https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=56&#038;d=identicon&#038;r=G 1x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=84&#038;d=identicon&#038;r=G 1.5x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=112&#038;d=identicon&#038;r=G 2x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=168&#038;d=identicon&#038;r=G 3x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=224&#038;d=identicon&#038;r=G 4x' class='avatar avatar-56' height='56' width='56' decoding='async' />\t</div>\n\n\t<div class=\"author-description\">\n\t\t<h3 class=\"author-title\">Bishop</h3>\n\n\t\t<p class=\"author-bio\">\n\t\t\tLover of Books &amp; Journey &amp; Music\t\t\t<a class=\"author-link\" href=\"https://bishopsun1988.wordpress.com/author/bishopsun1988/\" rel=\"author\">\n\t\t\t\t查看 Bishop 发布的所有文章\t\t\t</a>\n\t\t</p>\n\n\t</div>\n</div>\n\n\t<footer class=\"entry-footer\">\n\t\t<span class=\"posted-on\"><span class=\"screen-reader-text\">发表于 </span><a href=\"https://bishopsun1988.wordpress.com/2020/10/02/%e5%85%b3%e4%ba%8e%e4%b8%aa%e4%ba%ba%e6%8a%a4%e5%9f%8e%e6%b2%b3/\" rel=\"bookmark\"><time class=\"entry-date published\" datetime=\"2020-10-02T01:44:49+08:00\">2020-10-02</time><time class=\"updated\" datetime=\"2020-10-02T01:45:51+08:00\">2020-10-02</time></a></span><span class=\"byline\"><span class=\"screen-reader-text\">作者 </span><span class=\"author vcard\"><a class=\"url fn n\" href=\"https://bishopsun1988.wordpress.com/author/bishopsun1988/\">Bishop</a></span></span><span class=\"cat-links\"><span class=\"screen-reader-text\">分类 </span><a href=\"https://bishopsun1988.wordpress.com/category/%e6%97%a5%e8%ae%b0/\" rel=\"category tag\">日记</a></span><span class=\"tags-links\"><span class=\"screen-reader-text\">标签 </span><a href=\"https://bishopsun1988.wordpress.com/tag/%e4%b8%aa%e4%ba%ba%e6%8a%a4%e5%9f%8e%e6%b2%b3/\" rel=\"tag\">个人护城河</a></span>\t\t\t</footer>\n\n</article>\n\n<div id=\"comments\" class=\"comments-area\">\n\n\t\n\t\n\t\t<div id=\"respond\" class=\"comment-respond\">\n\t\t<h3 id=\"reply-title\" class=\"comment-reply-title\">留下评论 <small><a rel=\"nofollow\" id=\"cancel-comment-reply-link\" href=\"/2020/10/02/%e5%85%b3%e4%ba%8e%e4%b8%aa%e4%ba%ba%e6%8a%a4%e5%9f%8e%e6%b2%b3/#respond\" style=\"display:none;\">取消回复</a></small></h3><form action=\"https://bishopsun1988.wordpress.com/wp-comments-post.php\" method=\"post\" id=\"commentform\" class=\"comment-form\">\n\n\n<div class=\"comment-form__verbum transparent\">", "excerpt": "什么是个人护城河？ 你拥有别人没有的竞争优势，可以是工作上某方面的技能，也可能是生活中的技能，且这种优势可以累积，随着时间不断增长，从而你的不可取代性会更强。", "date": "Thu, 01 Oc"}, {"title": "关于“内卷化”", "link": "https://bishopsun1988.wordpress.com/2020/10/02/%e5%85%b3%e4%ba%8e%e5%86%85%e5%8d%b7%e5%8c%96/", "pub_date": "Thu, 01 Oct 2020", "slug": "post-11", "content": "<p class=\"wp-block-paragraph\">最近一年有个词被很多互联网IT从业者频繁提及，也许你在网络上或者个人自媒体文章里有所接触，那便是“内卷化”，乍一听，这词儿不是那么容易理解，没关系，看完下面的内容你便理解了。</p>\n\n\n\n<p class=\"wp-block-paragraph\">内卷化一词源于美国人类学家吉尔茨（Clifford Geertz）《农业内卷化》（Agricultural Involution）。根据吉尔茨的定义，“内卷化”是指一种社会或文化模式在某一发展阶段达到一种确定的形式后，便停滞不前或无法转化为另一种高级模式的现象。黄宗智在《长江三角洲小农家庭与乡村发展》中，把内卷化这一概念用于中国经济发展与社会变迁的研究，他把通过在有限的土地上投入大量的劳动力来获得总产量增长的方式，即边际效益递减的方式，称为没有发展的增长即“内卷化”。</p>\n\n\n\n<p class=\"wp-block-paragraph\">有内卷化，便有对应的内卷化效应。那什么又是内卷化效应呢？</p>\n\n\n\n<p class=\"wp-block-paragraph\">内卷化效应就是长期从事一项相同的工作，并且保持在一定的层面，没有任何变化和改观。这种行为通常是一种自我懈怠，自我消耗。是近年来在中国社会学研究领域被认为“和中国社会的某些特色联系密切且使用频率较高、影响较广泛的概念”。</p>\n\n\n\n<p class=\"wp-block-paragraph\">其实写到这儿，我自己也深感自己也长期处于内卷化效应中，进入公司七年，一直处在底层，打拼在一线，没有任何起色，多次反省后，也认为自己比较懈怠，长此以往，精力不断被消耗，工作激情不断被淡化，对工作的态度也是逐渐淡漠，我相信，在当前社会，还有很多与我类似的人，一直处于内卷化效应的洪流无法自拔。</p>\n\n\n\n<p class=\"wp-block-paragraph\">关于内卷化效应，还有一个起源的故事可以分享给大家。</p>\n\n\n\n<p class=\"wp-block-paragraph\">20世纪60年代末，一位名叫利福德·盖尔茨的美国人类文化学家，曾在爪哇岛生活过。这位学者，无心观赏岛上美景，只潜心研究当地的农耕生活。他眼中看到的都是犁耙收割，日复一日，年复一年，原生态农业在维持着田园景色的同时，长期停留在一种简单重复、没有进步的轮回状态。这位学者把这种现象冠名为“内卷化”。 此后，这一概念便被广泛应用到了政治、经济、社会、文化及其他学术研究中。“内卷化”作为一个学术概念，意指一个社会或组织既无突变式的发展，也无渐进式的增长，长期以来，只是在一个简单层次上自我重复。作为学术概念，其实并不深奥，观察我们的现实生活，就有很多这样的“内卷化现象”。</p>\n\n\n\n<p class=\"wp-block-paragraph\">1996年另一个美国学者杜赞奇提出“国家政权的内卷化的概念”。“国家政权的内卷化，意味着国家机构不是靠提高现有的组织机构的效能来推动社会发展，而是靠扩大非正式机构，把它们内卷于正式组织之中来行使权力。”</p>\n\n\n\n<p class=\"wp-block-paragraph\">再来一个更加形象生动的例子。</p>\n\n\n\n<p class=\"wp-block-paragraph\">中央电视台记者到陕北采访一个放羊的男孩，曾留下这样一段经典对话：</p>\n\n\n\n<p class=\"wp-block-paragraph\">“为什么要放羊？”</p>\n\n\n\n<p class=\"wp-block-paragraph\">“为了卖钱。”</p>\n\n\n\n<p class=\"wp-block-paragraph\">“卖钱做什么？”</p>\n\n\n\n<p class=\"wp-block-paragraph\">“娶媳妇。”</p>\n\n\n\n<p class=\"wp-block-paragraph\">“娶媳妇做什么呢？”</p>\n\n\n\n<p class=\"wp-block-paragraph\">“生孩子。”</p>\n\n\n\n<p class=\"wp-block-paragraph\">“生孩子为什么？”</p>\n\n\n\n<p class=\"wp-block-paragraph\">“放羊。”</p>\n\n\n\n<p class=\"wp-block-paragraph\">这段对话，就形象地为这种“内卷化”现象做了注解。</p>\n\n\n\n<p class=\"wp-block-paragraph\">社会生活中这种现象可以说无处不在。</p>\n\n\n\n<p class=\"wp-block-paragraph\">大到一个社会，小到一个组织，微观到一个人，一旦陷入这种状态，就如同车入泥潭，原地踏步，裹足不前，无谓地耗费着有限的资源，重复着简单的脚步，浪费着宝贵的人生。我国农村一些地方，特别是老少边穷地区，改革开放30年过去了，农民兄弟过的仍然是三亩地一头牛，老婆孩子热炕头的农耕生活；同样在一个单位供职，有的人几年一个台阶，士别几日就当刮目相看，而另一些人却原地不动，多少年过去了却一切照旧。</p>\n\n\n\n<p class=\"wp-block-paragraph\">一些企业，特别是中小企业和民营企业，这种内卷化现象尤其突出。一些民营企业内部实行家族化管理，重要岗位，不是七大姑，就是八大姨分兵把口，管理哲学是“打仗亲兄弟，上阵父子兵”，用自己的人放心。于是，在企业内部，鸡犬之声相闻，老死不相往来，外部的新鲜空气难以吹进来，真正优秀的人才也吸引不进来，措施和办法因循守旧。十几年乃至几十年过去了，厂房依旧，机器依旧，规模依旧，各方面都没有多大变化。企业进入了一种典型的“内卷化状态”。</p>\n\n\n\n<p class=\"has-dark-gray-color has-text-color wp-block-paragraph\"><amp-fit-text layout=\"fixed-height\" min-font-size=\"6\" max-font-size=\"72\" height=\"80\">无论是社会组织还是个人，进入内卷化状态，根本原因就在于精神状态和思想观念。人们常说，信心决定命运，观念决定出路。一个人如果总是自怨自艾，不思改变，不求进取，不谋开拓，民无信心，军无斗志，只能是原地不动，还有可能倒退。总是因陋就简，循规蹈矩，按部就班，只能进入周而复始的轮回状态。两千年的小农意识，生产的只能是两千年的自然经济，不可能产生出市场经济和现代经济。</amp-fit-text></p>\n<span id=\"wordads-inline-marker\" style=\"display: none;\"></span><div id=\"jp-post-flair\" class=\"sharedaddy\">\n<div id='jp-relatedposts' class='jp-relatedposts' >\n\t<h3 class=\"jp-relatedposts-headline\"><em>相关</em></h3>\n</div></div>\t</div>\n\n\t\n<div class=\"author-info\">\n\t<h2 class=\"author-heading\">发布者</h2>\n\t<div class=\"author-avatar\">\n\t\t<img referrerpolicy=\"no-referrer\" alt='未知 的头像' src='https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=56&#038;d=identicon&#038;r=G' srcset='https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=56&#038;d=identicon&#038;r=G 1x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=84&#038;d=identicon&#038;r=G 1.5x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=112&#038;d=identicon&#038;r=G 2x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=168&#038;d=identicon&#038;r=G 3x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d9379 iv>\n\n\t<footer class=\"entry-footer\">\n\t\t<span class=\"posted-on\"><span class=\"screen-reader-text\">发表于 </span><a href=\"https://bishopsun1988.wordpress.com/2018/02/01/%e8%ae%b0%e6%a2%a6/\" rel=\"bookmark\"><time class=\"entry-date published\" datetime=\"2018-02-01T17:10:02+08:00\">2018-02-01</time><time class=\"updated\" datetime=\"2018-02-01T17:10:34+08:00\">2018-02-01</time></a></span><span class=\"byline\"><span class=\"screen-reader-text\">作者 </span><span class=\"author vcard\"><a class=\"url fn n\" href=\"https://bishopsun1988.wordpress.com/author/bishopsun1988/\">Bishop</a></span></span><span class=\"cat-links\"><span class=\"screen-reader-text\">分类 </span><a href=\"https://bishopsun1988.wordpress.com/category/%e4%b8%aa%e4%ba%ba%e7%94%9f%e6%b4%bb/\" rel=\"category tag\">个人生活</a></span><span class=\"tags-links\"><span class=\"screen-reader-text\">标签 </span><a href=\"https://bishopsun1988.wordpress.com/tag/%e6%a2%a6/\" rel=\"tag\">梦</a></span>\t\t\t</footer>\n\n</article>\n\n<div id=\"comments\" class=\"comments-area\">\n\n\t\n\t\n\t\t<div id=\"respond\" class=\"comment-respond\">\n\t\t<h3 id=\"reply-title\" class=\"comment-reply-title\">留下评论 <small><a rel=\"nofollow\" id=\"cancel-comment-reply-link\" href=\"/2018/02/01/%e8%ae%b0%e6%a2%a6/#respond\" style=\"display:none;\">取消回复</a></small></h3><form action=\"https://bishopsun1988.wordpress.com/wp-comments-post.php\" method=\"post\" id=\"commentform\" class=\"comment-form\">\n\n\n<div class=\"comment-form__verbum transparent\">", "excerpt": "一声惊吓从梦中醒来，全身大汗淋漓，梦见自己被鬼压床，动弹不得。 \n\t\t\tLover of Books &amp; Journey &amp; Music\t\t\t\n\t\t\t\t查看 Bishop 发布的所有文章", "date": "Thu, 01 Fe"}, {"title": "《葡萄牙的高山》——向生命致敬的经典", "link": "https://bishopsun1988.wordpress.com/2018/02/25/%e3%80%8a%e8%91%a1%e8%90%84%e7%89%99%e7%9a%84%e9%ab%98%e5%b1%b1%e3%80%8b-%e5%90%91%e7%94%9f%e5%91%bd%e8%87%b4%e6%95%ac%e7%9a%84%e7%bb%8f%e5%85%b8/", "pub_date": "Sun, 25 Feb 2018", "slug": "post-28", "content": "<p>初拾此书，书名给人以极大的想象空间，仿佛是一本讲述一位冒险者在葡萄牙的某座高山历经千般险阻劫后余生的传奇般冒险故事，然而故事并没我想象的那么简单，作者的构思之巧妙，叙事手法与想象力也实属超乎我的预想。如果对该作者有过了解者，定不会惊奇，因为他的另一本小说《少年派的奇幻漂流》曾经轰动一时，加之李安导演后的电影大卖，更是加深世人对这段传奇漂流故事所震惊。同样，这本《高山》也定不负众望。<br />\n该书分为三个部分，每一部分独立成为一个故事，然而三个故事在某一点巧妙的紧密相连，构造了一个更加宏大的故事，前后跨越几个世纪。不必细说每个故事梗概，说出来就失去了小说原本的惊险刺激神秘气氛，也会让人失去继续读下去的欲望，个中细节以及故事情节，还需读者自己慢慢去体会，慢慢去品读。鄙人在此只是初略谈谈自己对其中印象最为深刻部分以及自己的一丝感悟。</p>\n<p>第一部分《无家可归》里故事主人公托马斯，在我看来，无疑是一个悲剧形象的存在。年级尚轻，便尝到了很多人花掉一辈子才能体验到的丧妻、丧子、丧父之痛，更可悲的是发生在一周之内，试问有几人能够体会此种痛楚？有几人能背负起这般痛苦带来的压力？不只是身体上的，更多的是精神上的。放诸当世常人，痛苦带来的巨大压力定会让大部分失去理智。同样，在我们这位悲剧的主人公身上同样看到了他在经历这般痛楚后所作出的反常举动，悖与常人的方式行走，其叔父极其奴仆都明白这是他丧失理智的表现，然而托马斯不以为然，这是他对上帝不公的反抗，这是他向上帝叫嚣的怒喊。并且他本人对于这种行为有自己的一套说辞。</p>\n<p><em>人在路上走，总要迎着风雨烈日，防备扑面而来的飞虫，忍受陌生人的阴郁眼神，面对无法预知的未来。既然如此，为何不转过身，用后脑勺和后背去抵挡呢？它们是我们的保护层，我们的铠甲。它们的作用原本就是抵御命运的无常。同时，当一个人倒着行走时，他相对更精致脆弱的部分——脸、胸、衣服上引人注目的饰物——都免受前方残酷世界的侵袭，只有遇上合得来的人时，才转身以目示人。</em></p>\n<p><em>至于运动方面，好处更多。人在下坡的时候，有什么方式比倒着走更自然吗？先是前脚掌轻柔着地，然后跟腱肌肉校准张力，精确地放下脚跟。这样一来，向下的动作弹性十足，毫无压力。且就算绊倒，有什么比一屁股坐在地上更安全呢？总比摔个狗吃屎、手腕骨折要强吧。</em></p>\n<p>对于这套说辞，有多少人会质疑?细细一想，没毛病，太有道理了。那么我们是不是都应该倒着行走，这样更符号托马斯所说的。如果真信，就太天真，这不过是他为自己反常举动做的一番伪装，伪装自己对上帝不公的抵抗。伟大的伪装者往往会以无懈可击的华美外衣卸掉自己内心深处一击即破的外壳，令世人被这华美外衣所蒙蔽。谈到这，不能不提到《伪装者》，靳东饰演的角色身披多层外衣，隐藏最深的GD身份，不可谓高境界的伪装者。</p>\n<p>第二部分《归途》故事中，有段关于耶稣神迹、以及被谋杀真相的论述，陈述者为病理医生洛左拉的妻子玛利亚，通过对耶稣神迹、惠于世人的事例、以及死亡真相的调查，对比与阿加莎克里斯蒂的小说叙述手法，得出阿加莎的小说完全是站在宗教信仰的立场，来揭秘一个个谋杀案的真相，而阿加莎小说灵魂人物赫尔克里波洛则是类似耶稣的人物，每次站在上帝视角为大家揭露真相。这段情节增加了第二段故事的可读性，先不去理会其真实性有多少，就里面提出的论述是极其新颖，或许国外侦探小说作者都喜欢站在宗教角度去解读《圣经》里的寓言故事以及神迹，另一部小说我能想到的便是丹布朗的《达芬奇密码》，不仅以创新的视角去解读达芬奇的名画，更甚者揭秘圣杯的秘密，还牵连出十字军东征的故事，不得不说一部伟大的侦探小说没有过人的知识储备与想象力，难以成就其美誉。</p>\n<span id=\"wordads-inline-marker\" style=\"display: none;\"></span><div id=\"jp-post-flair\" class=\"sharedaddy\">\n<div id='jp-relatedposts' class='jp-relatedposts' >\n\t<h3 class=\"jp-relatedposts-headline\"><em>相关</em></h3>\n</div></div>\t</div>\n\n\t\n<div class=\"author-info\">\n\t<h2 class=\"author-heading\">发布者</h2>\n\t<div class=\"author-avatar\">\n\t\t<img referrerpolicy=\"no-referrer\" alt='未知 的头像' src='https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=56&#038;d=identicon&#038;r=G' srcset='https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=56&#038;d=identicon&#038;r=G 1x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=84&#038;d=identicon&#038;r=G 1.5x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=112&#038;d=identicon&#038;r=G 2x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=168&#038;d=identicon&#038;r=G 3x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=224&#038;d=identicon&#038;r=G 4x' class='avatar avatar-56' height='56' width='56' decoding='async' />\t</div>\n\n\t<div class=\"author-description\">\n\t\t<h3 class=\"author-title\">Bishop</h3>\n\n\t\t<p class=\"author-bio\">\n\t\t\tLover of Books &amp; Journey &amp; Music\t\t\t<a class=\"author-link\" href=\"https://bishopsun1988.wordpress.com/author/bishopsun1988/\" rel=\"author\">\n\t\t\t\t查看 Bishop 发布的所有文章\t\t\t</a>\n\t\t</p>\n\n\t</div>\n</div>\n\n\t<footer class=\"entry-footer\">\n\t\t<span class=\"posted-on\"><span class=\"screen-reader-text\">发表于 </span><a href=\"https://bishopsun1988.wordpress.com/2018/02/25/%e3%80%8a%e8%91%a1%e8%90%84%e7%89%99%e7%9a%84%e9%ab%98%e5%b1%b1%e3%80%8b-%e5%90%91%e7%94%9f%e5%91%bd%e8%87%b4%e6%95%ac%e7%9a%84%e7%bb%8f%e5%85%b8/\" rel=\"bookmark\"><time class=\"entry-date published\" datetime=\"2018-02-25T16:19:11+08:00\">2018-02-25</time><time class=\"updated\" datetime=\"2018-05-28T14:40:56+08:00\">2018-05-28</time></a></span><span class=\"byline\"><span class=\"screen-reader-text\">作者 </span><span class=\"author vcard\"><a class=\"url fn n\" href=\"https://bishopsun1988.wordpress.com/author/bishopsun1988/\">Bishop</a></span></span><span class=\"cat-links\"><span class=\"screen-reader-text\">分类 </span><a href=\"https://bishopsun1988.wordpress.com/category/%e4%b9%a6/\" rel=\"category tag\">书</a></span><span class=\"tags-links\"><span class=\"screen-reader-text\">标签 </span><a href=\"https://bishopsun1988.wordpress.com/tag/%e7%94%9f%e5%91%bd/\" rel=\"tag\">生命</a>、<a href=\"https://bishopsun1988.wordpress.com/tag/%e8%91%a1%e8%90%84%e7%89%99%e7%9a%84%e9%ab%98%e5%b1%b1/\" rel=\"tag\">葡萄牙的高山</a>、<a href=\"https://bishopsun1988.wordpress.com/tag/%e6%9d%a8-%e9%a9%ac%e7%89%b9%e5%b0%94/\" rel=\"tag\">杨 马特尔</a>、<a href=\"https://bishopsun1988.wordpress.com/tag/%e4%ba%ba%e6%80%a7/\" rel=\"tag\">人性</a></span>\t\t\t</footer>\n\n</article>\n\n<div id=\"comments\" class=\"comments-area\">\n\n\t\n\t\n\t\t<div id=\"respond\" class=\"comment-respond\">\n\t\t<h3 id=\"reply-title\" class=\"comment-reply-title\">留下评论 <small><a rel=\"nofollow\" id=\"cancel-comment-reply-link\" href=\"/2018/02/25/%e3%80%8a%e8%91%a1%e8%90%84%e7%89%99%e7%9a%84%e9%ab%98%e5%b1%b1%e3%80%8b-%e5%90%91%e7%94%9f%e5%91%bd%e8%87%b4%e6%95%ac%e7%9a%84%e7%bb%8f%e5%85%b8/#respond\" style=\"display:none;\">取消回复</a></small></h3><form action=\"https://bishopsun1988.wordpress.com/wp-comments-post.php\" method=\"post\" id=\"commentform\" class=\"comment-form\">\n\n\n<div class=\"comment-form__verbum transparent\">", "excerpt": "初拾此书，书名给人以极大的想象空间，仿佛是一本讲述一位冒险者在葡萄牙的某座高山历经千般险阻劫后余生的传奇般冒险故事，然而故事并没我想象的那么简单，作者的构思之巧妙，叙事手法与想象力也实属超乎我的预想。如果对该作者有过了解者，定不会惊奇，因为他的另一本小说《少年派的奇幻漂流》曾经轰动一时，加之李安导演", "date": "Sun, 25 Fe"}, {"title": "迈向36岁的思考", "link": "https://bishopsun1988.wordpress.com/2024/05/12/%e8%bf%88%e5%90%9136%e5%b2%81%e7%9a%84%e6%80%9d%e8%80%83/", "pub_date": "Sun, 12 May 2024", "slug": "36", "content": "<p class=\"wp-block-paragraph\">35岁，被广大网友嫌弃、焦虑的年龄，然而我已快结束这个年龄，迈向我的36。</p>\n\n\n\n<p class=\"wp-block-paragraph\">在迈入35岁时，没有任何网上说的那种感受，因为根本没时间来焦虑。当时正值一个大项目攻关的关键阶段，顶着巨大压力，住在深圳景田地铁站附件的一个破旧日租屋里，每天和公司团队忙碌着。</p>\n\n\n\n<p class=\"wp-block-paragraph\">35岁生日那天，我是几乎快忘记自己生日。还记得那天，下班很晚，回到住处，放下沉重的电脑包，换上广东本地人标配穿着-穿上拖鞋出门。找了附近一家塔斯汀汉堡店，因为早在来深圳前，就听说这家汉堡店本土化很强，味道赶超麦当劳、KFC、汉堡王。随便点了一份35块左右的套餐，吃完还挺撑得慌。于是乎，就这样，我度过了自己的35岁生日。</p>\n\n\n\n<p class=\"wp-block-paragraph\">果不其然，在这个人生阶段性的年纪，老天爷给了我一个礼物，进公司以来，规模最大、复杂程度最高、项目金额最高的项目，被我们团队攻关下来了，我作为项目经理，开启了全程项目驻点的生活与工作。从项目前期的需求沟通、方案制作及优化，中期的项目实施（实施过程中的波折数不胜数，后面单独写一篇记录各种坑），后期的项目交付、运维。前前后后一年出差的时间，深圳这座陌生的城市，逐渐变得熟悉起来。</p>\n\n\n\n<p class=\"wp-block-paragraph\">现在项目进入交付阶段，但内心开始有许多感受无法诉说。中间与领导的多次争吵，曾让我多次想要离职，但总是会在我的自我安慰和调节中，冷静下来。这里面的委屈、心酸、不甘、恐惧、焦虑，恐怕只有我的媳妇儿最了解，因为每次处于情绪低谷、暴躁时刻，总是她在手机另一端陪着我。</p>\n\n\n\n<p class=\"wp-block-paragraph\">絮絮叨叨这么多，自己也不清楚到底想表达什么，反正就是瞎扯，想到什么说什么。坚信一点，不必为年龄焦虑，多一点自信，少一些自我怀疑。人生大道广阔无边，不必庸人自扰。</p>\n<span id=\"wordads-inline-marker\" style=\"display: none;\"></span><div id=\"jp-post-flair\" class=\"sharedaddy\">\n<div id='jp-relatedposts' class='jp-relatedposts' >\n\t<h3 class=\"jp-relatedposts-headline\"><em>相关</em></h3>\n</div></div>\t</div>\n\n\t\n<div class=\"author-info\">\n\t<h2 class=\"author-heading\">发布者</h2>\n\t<div class=\"author-avatar\">\n\t\t<img referrerpolicy=\"no-referrer\" alt='未知 的头像' src='https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=56&#038;d=identicon&#038;r=G' srcset='https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=56&#038;d=identicon&#038;r=G 1x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=84&#038;d=identicon&#038;r=G 1.5x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=112&#038;d=identicon&#038;r=G 2x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=168&#038;d=identicon&#038;r=G 3x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=224&#038;d=identicon&#038;r=G 4x' class='avatar avatar-56' height='56' width='56' decoding='async' />\t</div>\n\n\t<div class=\"author-description\">\n\t\t<h3 class=\"author-title\">Bishop</h3>\n\n\t\t<p class=\"author-bio\">\n\t\t\tLover of Books &amp; Journey &amp; Music\t\t\t<a class=\"author-link\" href=\"https://bishopsun1988.wordpress.com/author/bishopsun1988/\" rel=\"author\">\n\t\t\t\t查看 Bishop 发布的所有文章\t\t\t</a>\n\t\t</p>\n\n\t</div>\n</div>\n\n\t<footer class=\"entry-footer\">\n\t\t<span class=\"posted-on\"><span class=\"screen-reader-text\">发表于 </span><a href=\"https://bishopsun1988.wordpress.com/2024/05/12/%e8%bf%88%e5%90%9136%e5%b2%81%e7%9a%84%e6%80%9d%e8%80%83/\" rel=\"bookmark\"><time class=\"entry-date published\" datetime=\"2024-05-12T17:09:42+08:00\">2024-05-12</time><time class=\"updated\" datetime=\"2024-05-12T17:10:18+08:00\">2024-05-12</time></a></span><span class=\"byline\"><span class=\"screen-reader-text\">作者 </span><span class=\"author vcard\"><a class=\"url fn n\" href=\"https://bishopsun1988.wordpress.com/author/bishopsun1988/\">Bishop</a></span></span><span class=\"cat-links\"><span class=\"screen-reader-text\">分类 </span><a href=\"https://bishopsun1988.wordpress.com/category/%e6%97%a5%e8%ae%b0/\" rel=\"category tag\">日记</a></span><span class=\"tags-links\"><span class=\"screen-reader-text\">标签 </span><a href=\"https://bishopsun1988.wordpress.com/tag/35%e5%b2%81/\" rel=\"tag\">35岁</a>、<a href=\"https://bishopsun1988.wordpress.com/tag/%e4%b8%aa%e4%ba%ba%e6%80%9d%e8%80%83/\" rel=\"tag\">个人思考</a>、<a href=\"https://bishopsun1988.wordpress.com/tag/%e4%ba%ba%e7%94%9f/\" rel=\"tag\">人生</a></span>\t\t\t</footer>\n\n</article>\n\n<div id=\"comments\" class=\"comments-area\">\n\n\t\n\t\n\t\t<div id=\"respond\" class=\"comment-respond\">\n\t\t<h3 id=\"reply-title\" class=\"comment-reply-title\">留下评论 <small><a rel=\"nofollow\" id=\"cancel-comment-reply-link\" href=\"/2024/05/12/%e8%bf%88%e5%90%9136%e5%b2%81%e7%9a%84%e6%80%9d%e8%80%83/#respond\" style=\"display:none;\">取消回复</a></small></h3><form action=\"https://bishopsun1988.wordpress.com/wp-comments-post.php\" method=\"post\" id=\"commentform\" class=\"comment-form\">\n\n\n<div class=\"comment-form__verbum transparent\">", "excerpt": "35岁，被广大网友嫌弃、焦虑的年龄，然而我已快结束这个年龄，迈向我的36。 在迈入35岁时，没有任何网上说的那种感受，因为根本没时间来焦虑。当时正值一个大项目攻关的关键阶段，顶着巨大压力，住在深圳景田地铁站附件的一个破旧日租屋里，每天和公司团队忙碌着。", "date": "Sun, 12 Ma"}, {"title": "随笔", "link": "https://bishopsun1988.wordpress.com/2018/02/11/%e9%9a%8f%e7%ac%94/", "pub_date": "Sat, 10 Feb 2018", "slug": "post-29", "content": "<p>又一个新年将至，如此的夜晚已不知经历了多少回，但至少都有一个共同点，“孤寂”。没错，我已经度过了无数个这样的夜晚。每到此刻，往事一幕幕浮现。有当年大学的美好时光，也有初入职场的酸涩，更有小时候与家人一起准备春节的欢腾气氛。</p>\n<p>今天已是腊月二十五，距离除夕不到一周，按照老家习俗，到了该蒸米豆腐、磨汤圆面的时间。家家户户一大早起来，备好糯米。一边准备稻草把子，将其烧成灰烬，填满竹子编的筛筐，用热水过一遍，然后就得到了米豆腐需要的带碱味的水，颜色浅黄浅黄，为了增加米豆腐的口感，还会剪几个栀子或者干辣椒放入水里。接下来便是碾磨。小时候穷，家里或者院子里都没有机械式的打米机，全靠人力带动磨盘碾磨米豆腐与汤圆粉。后来有了打米机，就用机器碾磨，一边加糯米，一边加提前准备好的碱水，出来的就是很粘稠的糊状液体。最后上锅，锅上搁一簸箕，簸箕上盖一层布，将碾磨后的米豆腐糊状倒上去，铺开满满一层，再用筷子或刀划拉几下。接下来，只需等待，等待美味口可的米豆腐成型。刚出笼的米豆腐，呈蜡黄色，中间蜂窝状，蘸着酱汁，吃起来美滋滋，不过大人总劝告小孩少吃，碱味重，吃太多对肠道不好。</p>\n<p><img data-attachment-id=\"40\" data-permalink=\"https://bishopsun1988.wordpress.com/2018/02/11/%e9%9a%8f%e7%ac%94/img_0656/\" data-orig-file=\"https://bishopsun1988.wordpress.com/wp-content/uploads/2018/02/img_0656.jpg\" data-orig-size=\"1024,782\" data-comments-opened=\"1\" data-image-meta=\"{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}\" data-image-title=\"img_0656\" data-image-description=\"\" data-image-caption=\"\" data-large-file=\"https://bishopsun1988.wordpress.com/wp-content/uploads/2018/02/img_0656.jpg?w=660\" class=\" wp-image-40 aligncenter\" src=\"https://bishopsun1988.wordpress.com/wp-content/uploads/2018/02/img_0656.jpg?w=403&#038;h=308\" width=\"403\" height=\"308\" srcset=\"https://bishopsun1988.wordpress.com/wp-content/uploads/2018/02/img_0656.jpg?w=403&amp;h=308 403w, https://bishopsun1988.wordpress.com/wp-content/uploads/2018/02/img_0656.jpg?w=806&amp;h=616 806w, https://bishopsun1988.wordpress.com/wp-content/uploads/2018/02/img_0656.jpg?w=150&amp;h=115 150w, https://bishopsun1988.wordpress.com/wp-content/uploads/2018/02/img_0656.jpg?w=300&amp;h=229 300w, https://bishopsun1988.wordpress.com/wp-content/uploads/2018/02/img_0656.jpg?w=768&amp;h=587 768w\" sizes=\"(max-width: 403px) 100vw, 403px\" /></p>\n<p>相对而言，汤圆粉的制作简单很多，少了制作碱水以及上锅蒸的步骤，其他与米豆腐类似，最后用布袋子装好，此时是有很多水分，需要沥干。老家常见的做法是直接吊着，下面用一盆子接沥出的水。等到大年三十早上，准保可以尝到口味滑腻而又不腻人的汤圆。</p>\n<p><img data-attachment-id=\"41\" data-permalink=\"https://bishopsun1988.wordpress.com/2018/02/11/%e9%9a%8f%e7%ac%94/img_0657/\" data-orig-file=\"https://bishopsun1988.wordpress.com/wp-content/uploads/2018/02/img_0657.jpg\" data-orig-size=\"450,299\" data-comments-opened=\"1\" data-image-meta=\"{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}\" data-image-title=\"img_0657\" data-image-description=\"\" data-image-caption=\"\" data-large-file=\"https://bishopsun1988.wordpress.com/wp-content/uploads/2018/02/img_0657.jpg?w=450\" class=\" wp-image-41 aligncenter\" src=\"https://bishopsun1988.wordpress.com/wp-content/uploads/2018/02/img_0657.jpg?w=404&#038;h=269\" width=\"404\" height=\"269\" srcset=\"https://bishopsun1988.wordpress.com/wp-content/uploads/2018/02/img_0657.jpg?w=404&amp;h=268 404w, https://bishopsun1988.wordpress.com/wp-content/uploads/2018/02/img_0657.jpg?w=150&amp;h=100 150w, https://bishopsun1988.wordpress.com/wp-content/uploads/2018/02/img_0657.jpg?w=300&amp;h=199 300w, https://bishopsun1988.wordpress.com/wp-content/uploads/2018/02/img_0657.jpg 450w\" sizes=\"(max-width: 404px) 100vw, 404px\" /></p>\n<p>深夜想到并且谈论吃，无疑是对自己最残忍的事情。本是情绪低落的思乡情绪，却最后变成了对美食的祭祀，也许这便是所谓的“思乡蛋白酶”催生的美食欲望，意思是说一个人身在异乡，思乡思的不是家乡，而是家乡的美食，因为只有味蕾是最敏感也最具有强烈的记忆功能。所以谈家乡的美食与想念家乡并不矛盾。</p>\n\t\t<div id=\"geo-post-42\" class=\"geo geo-post\" style=\"display: none\">\n\t\t\t<span class=\"latitude\">30.547333</span>\n\t\t\t<span class=\"longitude\">104.099478</span>", "excerpt": "又一个新年将至，如此的夜晚已不知经历了多少回，但至少都有一个共同点，“孤寂”。没错，我已经度过了无数个这样的夜晚。每到此刻，往事一幕幕浮现。有当年大学的美好时光，也有初入职场的酸涩，更有小时候与家人一起准备春节的欢腾气氛。 今天已是腊月二十五，距离除夕不到一周，按照老家习俗，到了该蒸米豆腐、磨汤圆面", "date": "Sat, 10 Fe"}, {"title": "简评：刘以鬯—《酒徒》", "link": "https://bishopsun1988.wordpress.com/2018/01/30/%e5%88%98%e4%bb%a5%e9%ac%af%e3%80%8a%e9%85%92%e5%be%92%e3%80%8b%e7%ae%80%e8%af%84/", "pub_date": "Mon, 29 Jan 2018", "slug": "post-32", "content": "<p><img data-attachment-id=\"30\" data-permalink=\"https://bishopsun1988.wordpress.com/2018/01/30/%e5%88%98%e4%bb%a5%e9%ac%af%e3%80%8a%e9%85%92%e5%be%92%e3%80%8b%e7%ae%80%e8%af%84/20120730162836597_6955/\" data-orig-file=\"https://bishopsun1988.wordpress.com/wp-content/uploads/2018/01/20120730162836597_6955.jpg\" data-orig-size=\"500,500\" data-comments-opened=\"1\" data-image-meta=\"{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}\" data-image-title=\"20120730162836597_6955\" data-image-description=\"\" data-image-caption=\"\" data-large-file=\"https://bishopsun1988.wordpress.com/wp-content/uploads/2018/01/20120730162836597_6955.jpg?w=500\" class=\"wp-image-30 alignnone\" src=\"https://bishopsun1988.wordpress.com/wp-content/uploads/2018/01/20120730162836597_6955.jpg?w=353&#038;h=353\" alt=\"20120730162836597_6955\" width=\"353\" height=\"353\" srcset=\"https://bishopsun1988.wordpress.com/wp-content/uploads/2018/01/20120730162836597_6955.jpg?w=353&amp;h=353 353w, https://bishopsun1988.wordpress.com/wp-content/uploads/2018/01/20120730162836597_6955.jpg?w=150&amp;h=150 150w, https://bishopsun1988.wordpress.com/wp-content/uploads/2018/01/20120730162836597_6955.jpg?w=300&amp;h=300 300w, https://bishopsun1988.wordpress.com/wp-content/uploads/2018/01/20120730162836597_6955.jpg 500w\" sizes=\"(max-width: 353px) 100vw, 353px\" /></p>\n<blockquote>\n<p style=\"text-align:left;\">生銹的感情又逢落雨天，思想在煙圈裡捉迷藏。</p>\n<p style=\"text-align:left;\">推開窗，雨滴在窗外的樹枝上眨眼。</p>\n<p style=\"text-align:left;\">雨，似舞蹈者的腳步，從葉瓣上滑落。</p>\n</blockquote>\n<p>小说开篇便给人营造了一种无以复加的忧郁阴冷基调，从而将读者囿于此氛围中，进而逐渐迷醉于他那轻灵柔动而又或蓝调或爵士般的文字当中。</p>\n<p>该小说被称为中国第一篇意识流小说，读起来不似《追忆似水年华》、《尤利西斯》、《喧哗与骚动》、《到灯塔去》那般晦涩难懂，然则开创了中国意识流先河。小说故事背景设定在上个世纪的香港，文学艺术不被重视，盗版成风的年代，有的只是泛滥成灾为求生存而写的武侠小说、黄色小说，严肃而纯粹的文学作品却被冷落街头，不受关注。小说主人公本有一颗立志掀起香港文学革命浪潮的夙愿，与好友创刊《前卫文学》意图唤起蒙昧港人的文学意识，然则现实何等残酷，终究无法抵挡低销量与发行量的厄运，自己也沦为“如毒素般害人的黄色小说”专业写手，惶惶不可终日，以酒为伴，失去一个又一个“敢爱而不敢爱却又难以忘怀的女人”。</p>\n<span id=\"wordads-inline-marker\" style=\"display: none;\"></span><div id=\"jp-post-flair\" class=\"sharedaddy\">\n<div id='jp-relatedposts' class='jp-relatedposts' >\n\t<h3 class=\"jp-relatedposts-headline\"><em>相关</em></h3>\n</div></div>\t</div>\n\n\t\n<div class=\"author-info\">\n\t<h2 class=\"author-heading\">发布者</h2>\n\t<div class=\"author-avatar\">\n\t\t<img referrerpolicy=\"no-referrer\" alt='未知 的头像' src='https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=56&#038;d=identicon&#038;r=G' srcset='https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=56&#038;d=identicon&#038;r=G 1x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=84&#038;d=identicon&#038;r=G 1.5x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=112&#038;d=identicon&#038;r=G 2x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=168&#038;d=identicon&#038;r=G 3x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=224&#038;d=identicon&#038;r=G 4x' class='avatar avatar-56' height='56' width='56' decoding='async' />\t</div>\n\n\t<div class=\"author-description\">\n\t\t<h3 class=\"author-title\">Bishop</h3>\n\n\t\t<p class=\"author-bio\">\n\t\t\tLover of Books &amp; Journey &amp; Music\t\t\t<a class=\"author-link\" href=\"https://bishopsun1988.wordpress.com/author/bishopsun1988/\" rel=\"author\">\n\t\t\t\t查看 Bishop 发布的所有文章\t\t\t</a>\n\t\t</p>\n\n\t</div>\n</div>\n\n\t<footer class=\"entry-footer\">\n\t\t<span class=\"posted-on\"><span class=\"screen-reader-text\">发表于 </span><a href=\"https://bishopsun1988.wordpress.com/2018/01/30/%e5%88%98%e4%bb%a5%e9%ac%af%e3%80%8a%e9%85%92%e5%be%92%e3%80%8b%e7%ae%80%e8%af%84/\" rel=\"bookmark\"><time class=\"entry-date published\" datetime=\"2018-01-30T06:25:15+08:00\">2018-01-30</time><time class=\"updated\" datetime=\"2021-01-16T20:30:29+08:00\">2021-01-16</time></a></span><span class=\"byline\"><span class=\"screen-reader-text\">作者 </span><span class=\"author vcard\"><a class=\"url fn n\" href=\"https://bishopsun1988.wordpress.com/author/bishopsun1988/\">Bishop</a></span></span><span class=\"cat-links\"><span class=\"screen-reader-text\">分类 </span><a href=\"https://bishopsun1988.wordpress.com/category/%e4%b9%a6/\" rel=\"category tag\">书</a></span><span class=\"tags-links\"><span class=\"screen-reader-text\">标签 </span><a href=\"https://bishopsun1988.wordpress.com/tag/%e9%85%92%e5%be%92/\" rel=\"tag\">酒徒</a>、<a href=\"https://bishopsun1988.wordpress.com/tag/%e5%88%98%e4%bb%a5%e9%ac%af/\" rel=\"tag\">刘以鬯</a>、<a href=\"https://bishopsun1988.wordpress.com/tag/%e4%b9%a6%e8%af%84/\" rel=\"tag\">书评</a></span>\t\t\t</footer>\n\n</article>\n\n<div id=\"comments\" class=\"comments-area\">\n\n\t\n\t\n\t\t<div id=\"respond\" class=\"comment-respond\">\n\t\t<h3 id=\"reply-title\" class=\"comment-reply-title\">留下评论 <small><a rel=\"nofollow\" id=\"cancel-comment-reply-link\" href=\"/2018/01/30/%e5%88%98%e4%bb%a5%e9%ac%af%e3%80%8a%e9%85%92%e5%be%92%e3%80%8b%e7%ae%80%e8%af%84/#respond\" style=\"display:none;\">取消回复</a></small></h3><form action=\"https://bishopsun1988.wordpress.com/wp-comments-post.php\" method=\"post\" id=\"commentform\" class=\"comment-form\">\n\n\n<div class=\"comment-form__verbum transparent\">", "excerpt": "生銹的感情又逢落雨天，思想在煙圈裡捉迷藏。", "date": "Mon, 29 Ja"}, {"title": "简评 ：哈金—《等待》", "link": "https://bishopsun1988.wordpress.com/2018/01/30/%e3%80%8a%e7%ad%89%e5%be%85%e3%80%8b%e7%ae%80%e8%af%84/", "pub_date": "Mon, 29 Jan 2018", "slug": "post-33", "content": "<p><img data-attachment-id=\"26\" data-permalink=\"https://bishopsun1988.wordpress.com/2018/01/30/%e3%80%8a%e7%ad%89%e5%be%85%e3%80%8b%e7%ae%80%e8%af%84/s26012737/\" data-orig-file=\"https://bishopsun1988.wordpress.com/wp-content/uploads/2018/01/s26012737.jpg\" data-orig-size=\"303,438\" data-comments-opened=\"1\" data-image-meta=\"{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}\" data-image-title=\"s26012737\" data-image-description=\"\" data-image-caption=\"\" data-large-file=\"https://bishopsun1988.wordpress.com/wp-content/uploads/2018/01/s26012737.jpg?w=303\" class=\"  wp-image-26 aligncenter\" src=\"https://bishopsun1988.wordpress.com/wp-content/uploads/2018/01/s26012737.jpg?w=209&#038;h=302\" alt=\"s26012737\" width=\"209\" height=\"302\" srcset=\"https://bishopsun1988.wordpress.com/wp-content/uploads/2018/01/s26012737.jpg?w=209&amp;h=302 209w, https://bishopsun1988.wordpress.com/wp-content/uploads/2018/01/s26012737.jpg?w=104&amp;h=150 104w, https://bishopsun1988.wordpress.com/wp-content/uploads/2018/01/s26012737.jpg 303w\" sizes=\"(max-width: 209px) 100vw, 209px\" /></p>\n<p>哈金，一位旅居美国的华人，花费四年光阴写成此小说，对于小说中词句斟酌再三，反复推敲，力求全小说朴实无华，接地气，符合上世纪六十至九十年代气息。语言风格切入小说背景，无丝毫违和感。对人物、风景的刻画描写，细致入微。</p>\n<p>一段上个世纪六十年代至九十年代的故事，一段曲折坎坷的爱情故事，一段等待了十八年之久换来的婚姻，一段还将继续等待下去的慢慢人生之路。</p>\n<p>哈金这篇小说讲述了几段关于等待的故事，紧紧扣住“等待”这一主题。常年守在老家照顾老人孩子的妻子等待丈夫从部队归来，仅为了短暂的相处时光；才华与美貌兼并的少女从爱上他的那刻一直等待着她们爱情能有完美的结局，直到十八年后换来了看似很美好的婚姻；离婚后的妻子默默的等待着丈夫的再次回归，希冀就此相伴终生……</p>\n<span id=\"wordads-inline-marker\" style=\"display: none;\"></span><div id=\"jp-post-flair\" class=\"sharedaddy\">\n<div id='jp-relatedposts' class='jp-relatedposts' >\n\t<h3 class=\"jp-relatedposts-headline\"><em>相关</em></h3>\n</div></div>\t</div>\n\n\t\n<div class=\"author-info\">\n\t<h2 class=\"author-heading\">发布者</h2>\n\t<div class=\"author-avatar\">\n\t\t<img referrerpolicy=\"no-referrer\" alt='未知 的头像' src='https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=56&#038;d=identicon&#038;r=G' srcset='https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=56&#038;d=identicon&#038;r=G 1x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=84&#038;d=identicon&#038;r=G 1.5x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=112&#038;d=identicon&#038;r=G 2x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=168&#038;d=identicon&#038;r=G 3x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=224&#038;d=identicon&#038;r=G 4x' class='avatar avatar-56' height='56' width='56' decoding='async' />\t</div>\n\n\t<div class=\"author-description\">\n\t\t<h3 class=\"author-title\">Bishop</h3>\n\n\t\t<p class=\"author-bio\">\n\t\t\tLover of Books &amp; Journey &amp; Music\t\t\t<a class=\"author-link\" href=\"https://bishopsun1988.wordpress.com/author/bishopsun198
