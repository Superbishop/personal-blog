至九十年代气息。语言风格切入小说背景，无丝毫违和感。对人物、风景的刻画描写，细致入微。", "date": "Mon, 29 Ja"}, {"title": "《岁末2017》", "link": "https://bishopsun1988.wordpress.com/2018/01/30/%e3%80%8a%e5%b2%81%e6%9c%ab2017%e3%80%8b/", "pub_date": "Mon, 29 Jan 2018", "slug": "2017", "content": "<p>微醺的酒醉，解去2017全身的疲惫。</p>\n<p>酒精散发的味道，既浓且醉。</p>\n<p>一句不经意的话语，聚集起爱玩吃鸡的六人。</p>\n<p>肆无忌惮的几小时，嚎叫、欢呼、雀跃……</p>\n<p>晚餐的江小白，带来微醉</p>\n<p>趁着酒兴，狂吃，兴至归家</p>\n<p>岁末的2017，兴奋喜悦，欢庆新年将至</p>\n<span id=\"wordads-inline-marker\" style=\"display: none;\"></span><div id=\"jp-post-flair\" class=\"sharedaddy\">\n<div id='jp-relatedposts' class='jp-relatedposts' >\n\t<h3 class=\"jp-relatedposts-headline\"><em>相关</em></h3>\n</div></div>\t</div>\n\n\t\n<div class=\"author-info\">\n\t<h2 class=\"author-heading\">发布者</h2>\n\t<div class=\"author-avatar\">\n\t\t<img referrerpolicy=\"no-referrer\" alt='未知 的头像' src='https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=56&#038;d=identicon&#038;r=G' srcset='https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=56&#038;d=identicon&#038;r=G 1x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=84&#038;d=identicon&#038;r=G 1.5x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=112&#038;d=identicon&#038;r=G 2x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=168&#038;d=identicon&#038;r=G 3x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=224&#038;d=identicon&#038;r=G 4x' class='avatar avatar-56' height='56' width='56' decoding='async' />\t</div>\n\n\t<div class=\"author-description\">\n\t\t<h3 class=\"author-title\">Bishop</h3>\n\n\t\t<p class=\"author-bio\">\n\t\t\tLover of Books &amp; Journey &amp; Music\t\t\t<a class=\"author-link\" href=\"https://bishopsun1988.wordpress.com/author/bishopsun1988/\" rel=\"author\">\n\t\t\t\t查看 Bishop 发布的所有文章\t\t\t</a>\n\t\t</p>\n\n\t</div>\n</div>\n\n\t<footer class=\"entry-footer\">\n\t\t<span class=\"posted-on\"><span class=\"screen-reader-text\">发表于 </span><a href=\"https://bishopsun1988.wordpress.com/2018/01/30/%e3%80%8a%e5%b2%81%e6%9c%ab2017%e3%80%8b/\" rel=\"bookmark\"><time class=\"entry-date published\" datetime=\"2018-01-30T06:06:28+08:00\">2018-01-30</time><time class=\"updated\" datetime=\"2021-01-16T20:26:03+08:00\">2021-01-16</time></a></span><span class=\"byline\"><span class=\"screen-reader-text\">作者 </span><span class=\"author vcard\"><a class=\"url fn n\" href=\"https://bishopsun1988.wordpress.com/author/bishopsun1988/\">Bishop</a></span></span><span class=\"cat-links\"><span class=\"screen-reader-text\">分类 </span><a href=\"https://bishopsun1988.wordpress.com/category/%e4%b8%aa%e4%ba%ba%e7%94%9f%e6%b4%bb/\" rel=\"category tag\">个人生活</a></span><span class=\"tags-links\"><span class=\"screen-reader-text\">标签 </span><a href=\"https://bishopsun1988.wordpress.com/tag/%e9%9a%8f%e7%ac%94/\" rel=\"tag\">随笔</a></span>\t\t\t</footer>\n\n</article>\n\n<div id=\"comments\" class=\"comments-area\">\n\n\t\n\t\n\t\t<div id=\"respond\" class=\"comment-respond\">\n\t\t<h3 id=\"reply-title\" class=\"comment-reply-title\">留下评论 <small><a rel=\"nofollow\" id=\"cancel-comment-reply-link\" href=\"/2018/01/30/%e3%80%8a%e5%b2%81%e6%9c%ab2017%e3%80%8b/#respond\" style=\"display:none;\">取消回复</a></small></h3><form action=\"https://bishopsun1988.wordpress.com/wp-comments-post.php\" method=\"post\" id=\"commentform\" class=\"comment-form\">\n\n\n<div class=\"comment-form__verbum transparent\">", "excerpt": "", "date": "Mon, 29 Ja"}, {"title": "《病夜》", "link": "https://bishopsun1988.wordpress.com/2018/01/29/%e3%80%8a%e7%97%85%e5%a4%9c%e3%80%8b/", "pub_date": "Mon, 29 Jan 2018", "slug": "post-35", "content": "<p>窗外夜色凝重，橘黄色的路灯带着一丝丝寒意直逼室内。</p>\n<p>思绪如缕缕青烟，飘到九重云霄，飘到&#8230;&#8230;</p>\n<p>“我们之间存在太多矛盾，还是分手吧。希望你能找到那个最懂你的她。”</p>\n<p>三年前，一觉醒来，揉着惺忪的眼睛，拿起手机，提示一条未读短信。</p>\n<p>是啊，我们之间太多矛盾，关乎各自的性格，同时也有很现实的问题，那就是房子。对比现在的房价，当年若一咬牙四处拼凑交首付，可能现在过着完全不一样的生活。至少或者说很大程度上我们不会分手，然后共同为月供为装修钱奋斗着，或许那年去见了她父母，然后看我人品不错待她女儿也挺好，虽然身高长相不出众，但应该也会同意把她女儿嫁给我。接着在成都给她谋个合适的工作，避免两地分居，共同设计装修方案，选风格，选材料，卧室墙壁一定是全蓝，有种大海的感觉，她理想中的卧室。等待装修结束，正式举行婚礼邀请四方宾客见证我俩的喜结连理……</p>\n<p>楼下马路上，一辆三轮车呼啸而过，寒气逼人，不禁簌簌发抖。</p>\n<p>抬起手腕，哦，才凌晨四点。</p>\n<p>“接下来有请新郎为新娘戴上神圣的戒指。”</p>\n<p>“大学同寝兄弟又一个嫁出去了，恭祝两位新人百年好合，早生贵子。”</p>\n<p>并附上一张现场婚宴图片。发送。</p>\n<p>朋友圈正好也有一条结婚的动态，仔细定睛一看，心凉了半截，时隔半年，她也结婚了。默默为她闺蜜的动态点赞并评论“麻烦代我向她说声新婚快乐，永远幸福”。</p>\n<span id=\"wordads-inline-marker\" style=\"display: none;\"></span><div id=\"jp-post-flair\" class=\"sharedaddy\">\n<div id='jp-relatedposts' class='jp-relatedposts' >\n\t<h3 class=\"jp-relatedposts-headline\"><em>相关</em></h3>\n</div></div>\t</div>\n\n\t\n<div class=\"author-info\">\n\t<h2 class=\"author-heading\">发布者</h2>\n\t<div class=\"author-avatar\">\n\t\t<img referrerpolicy=\"no-referrer\" alt='未知 的头像' src='https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=56&#038;d=identicon&#038;r=G' srcset='https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=56&#038;d=identicon&#038;r=G 1x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=84&#038;d=identicon&#038;r=G 1.5x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=112&#038;d=identicon&#038;r=G 2x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=168&#038;d=identicon&#038;r=G 3x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=224&#038;d=identicon&#038;r=G 4x' class='avatar avatar-56' height='56' width='56' decoding='async' />\t</div>\n\n\t<div class=\"author-description\">\n\t\t<h3 class=\"author-title\">Bishop</h3>\n\n\t\t<p class=\"author-bio\">\n\t\t\tLover of Books &amp; Journey &amp; Music\t\t\t<a class=\"author-link\" href=\"https://bishopsun1988.wordpress.com/author/bishopsun1988/\" rel=\"author\">\n\t\t\t\t查看 Bishop 发布的所有文章\t\t\t</a>\n\t\t</p>\n\n\t</div>\n</div>\n\n\t<footer class=\"entry-footer\">\n\t\t<span class=\"posted-on\"><span class=\"screen-reader-text\">发表于 </span><a href=\"https://bishopsun1988.wordpress.com/2018/01/29/%e3%80%8a%e7%97%85%e5%a4%9c%e3%80%8b/\" rel=\"bookmark\"><time class=\"entry-date published\" datetime=\"2018-01-29T14:36:13+08:00\">2018-01-29</time><time class=\"updated\" datetime=\"2018-05-28T15:06:57+08:00\">2018-05-28</time></a></span><span class=\"byline\"><span class=\"screen-reader-text\">作者 </span><span class=\"author vcard\"><a class=\"url fn n\" href=\"https://bishopsun1988.wordpress.com/author/bishopsun1988/\">Bishop</a></span></span><span class=\"cat-links\"><span class=\"screen-reader-text\">分类 </span><a href=\"https://bishopsun1988.wordpress.com/category/%e4%b8%aa%e4%ba%ba%e7%94%9f%e6%b4%bb/\" rel=\"category tag\">个人生活</a></span>\t\t\t</footer>\n\n</article>\n\n<div id=\"comments\" class=\"comments-area\">\n\n\t\n\t\n\t\t<div id=\"respond\" class=\"comment-respond\">\n\t\t<h3 id=\"reply-title\" class=\"comment-reply-title\">留下评论 <small><a rel=\"nofollow\" id=\"cancel-comment-reply-link\" href=\"/2018/01/29/%e3%80%8a%e7%97%85%e5%a4%9c%e3%80%8b/#respond\" style=\"display:none;\">取消回复</a></small></h3><form action=\"https://bishopsun1988.wordpress.com/wp-comments-post.php\" method=\"post\" id=\"commentform\" class=\"comment-form\">\n\n\n<div class=\"comment-form__verbum transparent\">", "excerpt": "窗外夜色凝重，橘黄色的路灯带着一丝丝寒意直逼室内。 思绪如缕缕青烟，飘到九重云霄，飘到&#8230;&#8230;", "date": "Mon, 29 Ja"}, {"title": "淘书记—成都送仙桥旧书市", "link": "https://bishopsun1988.wordpress.com/2018/05/28/%e8%b4%ad%e4%b9%a6%e8%ae%b0-%e6%88%90%e9%83%bd%e9%80%81%e4%bb%99%e6%a1%a5%e6%97%a7%e4%b9%a6%e5%b8%82/", "pub_date": "Mon, 28 May 2018", "slug": "post-26", "content": "<p>&nbsp;</p>\n<ul>\n<li style=\"text-align:justify;\">起因</li>\n</ul>\n<p>话说起来，踏上旧书市淘书之旅，起源于今年年初央视播出的纪录片《书迷》，总共<br />\n四集，即一本书的诞生、书店风景、淘书迷的地图、贩书记，印象最深也是最打动我<br />\n的便是第三集，里面讲述了三个不同城市的书迷淘书的故事，大V史航活跃在北京潘<br />\n家园旧书市，历史专业出身的徐老师行走在天津河畔的旧书市，作为台湾出版人的陈<br />\n老师常年穿梭于各个二手书店，三人不同职业但有着千丝万缕的关系，那便是书作为<br />\n纽带串起他们在这个平行时代的无形关联。当时自己就在想成都是否也有这样的旧书<br />\n市，不一定有潘家园的规模，能让我驻足醉心淘书便足矣。经过上网搜寻，发现成都<br />\n的确存在，只是由于当前二手书市场不景气，早已失去当年的繁盛。广大网友最常提<br />\n到的便是送仙桥书市，有着成都鬼市之称，大多数人只知那里是古玩玉器的交易场<br />\n所，殊不知也有大量旧书交易。此外，还有文殊院旁草堂北街的成都书市，早年是成<br />\n都另一个较大的二手书市，随着城市规划加快，搬迁至此。另有成都二手书源头之称<br />\n的荷花池旧书市，不过经营者日渐稀少，零星几家还在继续经营。</p>\n<ul>\n<li style=\"text-align:left;\">行动</li>\n</ul>\n<p>周六晚上下定决心，每周去一处书市，综合比较，以确定以后能固定去的书市。本周<br />\n选定口碑最佳的送仙桥旧书市，了解到该书市每周三、日开市，中午前闭市，心想还<br />\n挺傲娇啊，中午就闭市，这买卖做得还挺轻松。查询好路线，周日早八点出门，公交<br />\n过去需得转一条公交线，可直达送仙桥门口。心甚乐！</p>\n<p>来到书市已是十点左右，想到离闭市两小时左右，时间挺紧，而且还不知道具体在哪<br />\n里交易，只知道在某栋楼的楼顶，但又听说可能已被迁到其他地方，心里七上八下，<br />\n忐忑不已。进入古玩交易一条街，完全没有书市的踪迹。正踌躇不前时，看到有栋楼<br />\n有楼道，可以上去，抱着侥幸心里，进入。看到里面注明每层楼交易内容，“四楼，<br />\n二手旧书交易”。对了，就是这儿。快步爬上顶楼，进入满是旧书摊位的顶楼，心里<br />\n还紧张激动不已，随便选了一家旧书摊，细细观看每一本旧书条目，泛黄的纸张，厘<br />\n米级厚的灰尘，斑驳的书皮，偶有出现上一位拥有者的签名或者藏书章，这是我最喜<br />\n欢的一处，经过多人收藏辗转流通，然后进入下一位购书者手中，签名盖章。书依旧<br />\n是这本书，但不同的是拥有者不断变化，历经岁月磨砺，更有味道，休管它是蛀虫味<br />\n还是书香味。这便是旧书书迷最热衷之处。</p>\n<p>第一个摊位，快速浏览完毕，选定《王朔文集》上下集，算是集齐一套。又看到柏杨<br />\n《丑陋的中国人》，一直想要拜读的杂文集、演讲稿集。老板很直爽，三本20大洋，<br />\n直接掏钱付钱，作为以前买新书成癖的我，这个价可是一本新书都很难买到的啊，当<br />\n然不会还价啦。</p>\n<p>来到第二个摊位，老板与另外几个老板正在斗地主，看来交易清淡，他们也只能如此<br />\n打发时间。摊位前堆积如山的旧书，画册，过期杂志，完全未经整理，随便堆积，极<br />\n不方便挑选，另一边很多泛黄书页，跟烂咸菜一样，但看得出，历经时间很长，全是<br />\n线装书，只是成色太次，至多三四品，好不容挑选到一本商务印书馆出版的万有文库<br />\n系列欧美文学，心理价位差不多四五十吧，毕竟品相不好，询价老板，一口价一百五<br />\n十大洋。来之前了解过，万有文库系列丛书于上实际三十年代由王云五发起，商务印<br />\n书馆影印出版，总共4000册，涵盖国学、汉译世界名著和各个现代学科，共计5000<br />\n部，深受当时很多人喜爱，供不应求。因此一直想收录其中的汉译世界名著，没料想<br />\n市面价远高于心理价，遂暂时放弃，后续继续观望。</p>\n<p>来到第三个摊位，这摊位老板很有意思，虽早年没读多少书，但自打进入该行当，所<br />\n卖之书，基本都看过，所以懂得东西特多，也能侃。此外，摊位上有另一黄姓购书<br />\n者，貌似是这儿的常客，跟大家都熟识，遇到一个人，便会交流今天有何收获,选到什<br />\n么心仪之书。看似年纪不大，那是真能侃啊，我等简直望尘莫及，唯独一直附和着<br />\n他，从我国《四库全书》的保存现状到《永乐大典》正本失窃之谜，以及盗窃此书的<br />\n历史趣事，嘉士伯拍卖孤本善本的时时情况等，信手拈来，与他的一番对侃，获益不<br />\n少。看到我收了好几本外国文学，建议我一定要买网格本以及名家翻译的作品，否<br />\n则，不要轻易入手，价值不大。同时也推荐一本《平妖传》给我，初听此书，我很<br />\n懵，真的，闻所未闻啊，刚好老板有一本，仔细一看，罗贯中、冯梦龙著，心想这两<br />\n人居然有关联？而且这本书居然出自堂堂四大名著《三国演义》罗贯中之手，另据他<br />\n讲，如果只是罗贯中所著的版本，不要买，一定要买带有冯梦龙的版本，因为故事内<br />\n容以及叙事情节远比前者紧凑，毫无拖沓，而且篇幅也翻倍，人物故事更加饱满。我<br />\n自认为自己阅书也是无数，顿时觉得自己如浩渺星河里一颗砂砾。与他们的聊天极其<br />\n愉快，也增长不少见识，比如买书要懂得基本的版本学知识，不然容易误人误己，且<br />\n不说以后的藏书增殖如何。</p>\n<p>很快中午已至，帮着老板收完摊，提着自己一袋的战利品欣欣然回家。</p>\n<ul>\n<li style=\"text-align:left;\">感慨</li>\n</ul>\n<p>淘书的乐趣是巨大的，遇到一本好书，犹如遇见“前世千年的擦肩而过，换来此生一<br />\n次回眸”的情人。</p>\n<p>在浩如烟海的旧书堆中，总有一本在静默的等待着你的眷顾，它可能已被无数人“临<br />\n幸”过，但历经千年岁月，只为等待它最痴心的你。</p>\n<p>突然想到钱谦益与柳如是的传奇故事，也是一段千年传颂的爱情经典，柳如是便是那<br />\n一直等着钱牧斋用心呵护的那本千年孤本，万年珍本。</p>\n<ul>\n<li style=\"text-align:left;\">计划</li>\n</ul>\n<p>淘书生涯迈出第一步，接下来会继续下去，首先完成后面的几处旧书市的淘书历程，<br />\n然后综合比较，固定一处淘书，结交几位行业内的专业人士，希望自己以后淘书质量<br />\n以及门类不断提高与丰富。</p>\n<span id=\"wordads-inline-marker\" style=\"display: none;\"></span><div id=\"jp-post-flair\" class=\"sharedaddy\">\n<div id='jp-relatedposts' class='jp-relatedposts' >\n\t<h3 class=\"jp-relatedposts-headline\"><em>相关</em></h3>\n</div></div>\t</div>\n\n\t\n<div class=\"author-info\">\n\t<h2 class=\"author-heading\">发布者</h2>\n\t<div class=\"author-avatar\">\n\t\t<img referrerpolicy=\"no-referrer\" alt='未知 的头像' src='https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=56&#038;d=identicon&#038;r=G' srcset='https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=56&#038;d=identicon&#038;r=G 1x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=84&#038;d=identicon&#038;r=G 1.5x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=112&#038;d=identicon&#038;r=G 2x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=168&#038;d=identicon&#038;r=G 3x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=224&#038;d=identicon&#038;r=G 4x' class='avatar avatar-56' height='56' width='56' decoding='async' />\t</div>\n\n\t<div class=\"author-description\">\n\t\t<h3 class=\"author-title\">Bishop</h3>\n\n\t\t<p class=\"author-bio\">\n\t\t\tLover of Books &amp; Journey &amp; Music\t\t\t<a class=\"author-link\" href=\"https://bishopsun1988.wordpress.com/author/bishopsun1988/\" rel=\"author\">\n\t\t\t\t查看 Bishop 发布的所有文章\t\t\t</a>\n\t\t</p>\n\n\t</div>\n</div>\n\n\t<footer class=\"entry-footer\">\n\t\t<span class=\"posted-on\"><span class=\"screen-reader-text\">发表于 </span><a href=\"https://bishopsun1988.wordpress.com/2018/05/28/%e8%b4%ad%e4%b9%a6%e8%ae%b0-%e6%88%90%e9%83%bd%e9%80%81%e4%bb%99%e6%a1%a5%e6%97%a7%e4%b9%a6%e5%b8%82/\" rel=\"bookmark\"><time class=\"entry-date published\" datetime=\"2018-05-28T14:52:28+08:00\">2018-05-28</time><time class=\"updated\" datetime=\"2018-05-31T10:52:18+08:00\">2018-05-31</time></a></span><span class=\"byline\"><span class=\"screen-reader-text\">作者 </span><span class=\"author vcard\"><a class=\"url fn n\" href=\"https://bishopsun1988.wordpress.com/author/bishopsun1988/\">Bishop</a></span></span><span class=\"cat-links\"><span class=\"screen-reader-text\">分类 </span><a href=\"https://bishopsun1988.wordpress.com/category/%e6%97%a5%e8%ae%b0/\" rel=\"category tag\">日记</a>、<a href=\"https://bishopsun1988.wordpress.com/category/%e4%b8%aa%e4%ba%ba%e7%94%9f%e6%b4%bb/\" rel=\"category tag\">个人生活</a>、<a href=\"https://bishopsun1988.wordpress.com/category/%e4%b9%a6/\" rel=\"category tag\">书</a></span><span class=\"tags-links\"><span class=\"screen-reader-text\">标签 </span><a href=\"https://bishopsun1988.wordpress.com/tag/%e9%80%81%e4%bb%99%e6%a1%a5/\" rel=\"tag\">送仙桥</a>、<a href=\"https://bishopsun1988.wordpress.com/tag/%e6%88%90%e9%83%bd/\" rel=\"tag\">成都</a>、<a href=\"https://bishopsun1988.wordpress.com/tag/%e6%97%a7%e4%b9%a6/\" rel=\"tag\">旧书</a>、<a href=\"https://bishopsun1988.wordpress.com/tag/%e6%b7%98%e4%b9%a6%e8%ae%b0/\" rel=\"tag\">淘书记</a></span>\t\t\t</footer>\n\n</article>\n\n<div id=\"comments\" class=\"comments-area\">\n\n\t\n\t\n\t\t<div id=\"respond\" class=\"comment-respond\">\n\t\t<h3 id=\"reply-title\" class=\"comment-reply-title\">留下评论 <small><a rel=\"nofollow\" id=\"cancel-comment-reply-link\" href=\"/2018/05/28/%e8%b4%ad%e4%b9%a6%e8%ae%b0-%e6%88%90%e9%83%bd%e9%80%81%e4%bb%99%e6%a1%a5%e6%97%a7%e4%b9%a6%e5%b8%82/#respond\" style=\"display:none;\">取消回复</a></small></h3><form action=\"https://bishopsun1988.wordpress.com/wp-comments-post.php\" method=\"post\" id=\"commentform\" class=\"comment-form\">\n\n\n<div class=\"comment-form__verbum transparent\">", "excerpt": "话说起来，踏上旧书市淘书之旅，起源于今年年初央视播出的纪录片《书迷》，总共\n四集，即一本书的诞生、书店风景、淘书迷的地图、贩书记，印象最深也是最打动我\n的便是第三集，里面讲述了三个不同城市的书迷淘书的故事，大V史航活跃在北京潘\n家园旧书市，历史专业出身的徐老师行走在天津河畔的旧书市，作为台湾出版人的", "date": "Mon, 28 Ma"}, {"title": "裸辞宅家日记 6-28", "link": "https://bishopsun1988.wordpress.com/2021/06/28/%e8%a3%b8%e8%be%9e%e5%ae%85%e5%ae%b6%e6%97%a5%e8%ae%b0-6-28/", "pub_date": "Mon, 28 Jun 2021", "slug": "6-28", "content": "<div class=\"wp-block-jetpack-markdown\"><h2>正式裸辞是在4-23，到目前为止已有三个多月了，前两个月大部分时间都扑在了准备PMP考试的准备过程中，每周每天跟着报考机构班班的计划准备着考试，毕竟花了六七千在这上面，不想因为其他原因影响考试，所以找工作也是全不放在心上。6-20考试正式结束，也算是给自己努力挣扎半年的准备过程，交上了一份答卷吧，虽然目前结果未出，但可以肯定是能过，具体突破几A，未知数吧。</h2>\n<h2>考试后，开启了大量投递简历的时刻，当然也有很多用人单位主动发来意向，不过，聊了很多，面了也很多，也包括在准备PMP考试过程中参加的一些面试，深刻认识到，自己始终无法完全满足我所应聘岗位的职位要求，虽然每次面试我都能对打如流，自我感觉效果也不错，但最终都是等不到一纸offer。此过程中，出现了很多次自我怀疑，认为自己是否真不合适做项目经理。</h2>\n<h2>上周六在出发去阆中古城前的早八点，与一深圳科技公司项目领导进行了一场远程面试，不得不说，与项目主管的直接面试远比与HR的交谈，少了很多拐弯抹角、虚头巴脑的个人自我介绍等环节，直接进行项目管理技术环节的沟通，总的说来，面谈还挺顺利，只是对方关于我期望的薪资有所顾虑，因为一开始人家并未想过招聘拥有七八年工作经验的人员。当然，与我个人而言，该工作挑战不小，首先，该项目事业部领导欲建立分部于成都，技术、项目等各团队成员都未确定，连基本的办公室都没定下来。其次，该公司项目遍布全国，出差频率不会低，作为从未出差的我，的确是一新挑战。</h2>\n</div>\n\n\n\n<p class=\"wp-block-paragraph\"></p>\n<span id=\"wordads-inline-marker\" style=\"display: none;\"></span><div id=\"jp-post-flair\" class=\"sharedaddy\">\n<div id='jp-relatedposts' class='jp-relatedposts' >\n\t<h3 class=\"jp-relatedposts-headline\"><em>相关</em></h3>\n</div></div>\t</div>\n\n\t\n<div class=\"author-info\">\n\t< t-links\"><span class=\"screen-reader-text\">分类 </span><a href=\"https://bishopsun1988.wordpress.com/category/%e6%97%a5%e8%ae%b0/\" rel=\"category tag\">日记</a></span><span class=\"tags-links\"><span class=\"screen-reader-text\">标签 </span><a href=\"https://bishopsun1988.wordpress.com/tag/%e9%9a%8f%e7%ac%94/\" rel=\"tag\">随笔</a></span>\t\t\t</footer>\n\n</article>\n\n<div id=\"comments\" class=\"comments-area\">\n\n\t\n\t\n\t\t<div id=\"respond\" class=\"comment-respond\">\n\t\t<h3 id=\"reply-title\" class=\"comment-reply-title\">留下评论 <small><a rel=\"nofollow\" id=\"cancel-comment-reply-link\" href=\"/2021/06/28/%e8%a3%b8%e8%be%9e%e5%ae%85%e5%ae%b6%e6%97%a5%e8%ae%b0-6-28/#respond\" style=\"display:none;\">取消回复</a></small></h3><form action=\"https://bishopsun1988.wordpress.com/wp-comments-post.php\" method=\"post\" id=\"commentform\" class=\"comment-form\">\n\n\n<div class=\"comment-form__verbum transparent\">", "excerpt": "Lover of Books &amp; Journey &amp; Music\t\t\t\n\t\t\t\t查看 Bishop 发布的所有文章", "date": "Mon, 28 Ju"}, {"title": "一屋不扫，何以扫天下", "link": "https://bishopsun1988.wordpress.com/2020/04/27/%e4%b8%80%e5%b1%8b%e4%b8%8d%e6%89%ab%ef%bc%8c%e4%bd%95%e4%bb%a5%e6%89%ab%e5%a4%a9%e4%b8%8b/", "pub_date": "Mon, 27 Apr 2020", "slug": "post-18", "content": "<p class=\"wp-block-paragraph\">从近期蒋凡事件中，可以看出，一个人，一个男人，一个事业成功的男人，无论你事业多顺利，多么一帆风顺，家庭问题、个人私生活问题一旦处理不好，终会被其“反噬”。</p>\n\n\n\n<p class=\"wp-block-paragraph\">一个成功男人背后，一定会有贤妻良母型的女人作为其坚强后盾，让你可以无任何忧虑，安心发展自己的事业。 </p>\n\n\n\n<p class=\"wp-block-paragraph\">“一屋不扫，何以扫天下？”古人如是说，果然诚不欺我也。</p>\n\n\n\n<div class=\"wp-block-image is-style-default\"><figure class=\"aligncenter size-large is-resized\"><img data-attachment-id=\"155\" data-permalink=\"https://bishopsun1988.wordpress.com/2020/04/27/%e4%b8%80%e5%b1%8b%e4%b8%8d%e6%89%ab%ef%bc%8c%e4%bd%95%e4%bb%a5%e6%89%ab%e5%a4%a9%e4%b8%8b/img_3223/\" data-orig-file=\"https://bishopsun1988.wordpress.com/wp-content/uploads/2020/04/img_3223.png\" data-orig-size=\"640,1865\" data-comments-opened=\"1\" data-image-meta=\"{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}\" data-image-title=\"img_3223\" data-image-description=\"\" data-image-caption=\"\" data-large-file=\"https://bishopsun1988.wordpress.com/wp-content/uploads/2020/04/img_3223.png?w=351\" src=\"https://bishopsun1988.wordpress.com/wp-content/uploads/2020/04/img_3223.png?w=351\" alt=\"\" class=\"wp-image-155\" width=\"356\" height=\"1037\" srcset=\"https://bishopsun1988.wordpress.com/wp-content/uploads/2020/04/img_3223.png?w=356 356w, https://bishopsun1988.wordpress.com/wp-content/uploads/2020/04/img_3223.png?w=51 51w, https://bishopsun1988.wordpress.com/wp-content/uploads/2020/04/img_3223.png?w=103 103w, https://bishopsun1988.wordpress.com/wp-content/uploads/2020/04/img_3223.png 640w\" sizes=\"(max-width: 356px) 100vw, 356px\" /><figcaption>淘宝蒋凡被集团调查后处理结果</figcaption></figure>", "excerpt": "从近期蒋凡事件中，可以看出，一个人，一个男人，一个事业成功的男人，无论你事业多顺利，多么一帆风顺，家庭问题、个人私生活问题一旦处理不好，终会被其“反噬”。 一个成功男人背后，一定会有贤妻良母型的女人作为其坚强后盾，让你可以无任何忧虑，安心发展自己的事业。", "date": "Mon, 27 Ap"}, {"title": "重看《酒徒》有感", "link": "https://bishopsun1988.wordpress.com/2018/11/26/%e9%87%8d%e7%9c%8b%e3%80%8a%e9%85%92%e5%be%92%e3%80%8b%e6%9c%89%e6%84%9f/", "pub_date": "Mon, 26 Nov 2018", "slug": "post-24", "content": "<p>重看《酒徒》，依旧能感受到刘老先生当年对香港文坛堕落而唉叹不已。文中多处关于乔伊斯、海明威、加缪的描写以及生平简述，可见刘老并未完全对香港文坛丧失信心，持有乐观心态。麦荷门的信无疑对七十年代香港文坛现状展露无遗，喜爱文学的都是孤独的，沦为武侠黄色小说写手并不可耻，为了生存而已。艺术工作者只有保证存活下去才能继续搞创作。</p>\n<p>写到这儿，不禁想起金庸在那个年代持续在报刊上连载武侠小说无疑也是为了求得一线生存，加之其作为报社编辑，为了报社的存续及销量，武侠小说无疑都是那个时代最好的武器。<img data-attachment-id=\"79\" data-permalink=\"https://bishopsun1988.wordpress.com/2018/11/26/%e9%87%8d%e7%9c%8b%e3%80%8a%e9%85%92%e5%be%92%e3%80%8b%e6%9c%89%e6%84%9f/img_4221/\" data-orig-file=\"https://bishopsun1988.wordpress.com/wp-content/uploads/2018/11/img_4221.jpg\" data-orig-size=\"2148,2148\" data-comments-opened=\"1\" data-image-meta=\"{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}\" data-image-title=\"img_4221\" data-image-description=\"\" data-image-caption=\"\" data-large-file=\"https://bishopsun1988.wordpress.com/wp-content/uploads/2018/11/img_4221.jpg?w=660\" src=\"https://bishopsun1988.wordpress.com/wp-content/uploads/2018/11/img_4221.jpg?w=660\" class=\"alignnone size-full wp-image-79\"   srcset=\"https://bishopsun1988.wordpress.com/wp-content/uploads/2018/11/img_4221.jpg 2148w, https://bishopsun1988.wordpress.com/wp-content/uploads/2018/11/img_4221.jpg?w=150&amp;h=150 150w, https://bishopsun1988.wordpress.com/wp-content/uploads/2018/11/img_4221.jpg?w=300&amp;h=300 300w, https://bishopsun1988.wordpress.com/wp-content/uploads/2018/11/img_4221.jpg?w=768&amp;h=768 768w, https://bishopsun1988.wordpress.com/wp-content/uploads/2018/11/img_4221.jpg?w=1024&amp;h=1024 1024w, https://bishopsun1988.wordpress.com/wp-content/uploads/2018/11/img_4221.jpg?w=1440&amp;h=1440 1440w\" sizes=\"(max-width: 2148px) 100vw, 2148px\"></p>\n<span id=\"wordads-inline-marker\" style=\"display: none;\"></span><div id=\"jp-post-flair\" class=\"sharedaddy\">\n<div id='jp-relatedposts' class='jp-relatedposts' >\n\t<h3 class=\"jp-relatedposts-headline\"><em>相关</em></h3>\n</div></div>\t</div>\n\n\t\n<div class=\"author-info\">\n\t<h2 class=\"author-heading\">发布者</h2>\n\t<div class=\"author-avatar\">\n\t\t<img referrerpolicy=\"no-referrer\" alt='未知 的头像' src='https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d d937942e0615afabcdd580726ed961ed915db47225381e?s=56&#038;d=identicon&#038;r=G' srcset='https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=56&#038;d=identicon&#038;r=G 1x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=84&#038;d=identicon&#038;r=G 1.5x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=112&#038;d=identicon&#038;r=G 2x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=168&#038;d=identicon&#038;r=G 3x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=224&#038;d=identicon&#038;r=G 4x' class='avatar avatar-56' height='56' width='56' decoding='async' />\t</div>\n\n\t<div class=\"author-description\">\n\t\t<h3 class=\"author-title\">Bishop</h3>\n\n\t\t<p class=\"author-bio\">\n\t\t\tLover of Books &amp; Journey &amp; Music\t\t\t<a class=\"author-link\" href=\"https://bishopsun1988.wordpress.com/author/bishopsun1988/\" rel=\"author\">\n\t\t\t\t查看 Bishop 发布的所有文章\t\t\t</a>\n\t\t</p>\n\n\t</div>\n</div>\n\n\t<footer class=\"entry-footer\">\n\t\t<span class=\"posted-on\"><span class=\"screen-reader-text\">发表于 </span><a href=\"https://bishopsun1988.wordpress.com/2021/01/25/%e6%8e%a5%e4%b8%8b%e6%9d%a5%e7%9a%84%e5%b0%8f%e7%9b%ae%e6%a0%87/\" rel=\"bookmark\"><time class=\"entry-date published updated\" datetime=\"2021-01-25T12:06:05+08:00\">2021-01-25</time></a></span><span class=\"byline\"><span class=\"screen-reader-text\">作者 </span><span class=\"author vcard\"><a class=\"url fn n\" href=\"https://bishopsun1988.wordpress.com/author/bishopsun1988/\">Bishop</a></span></span><span class=\"cat-links\"><span class=\"screen-reader-text\">分类 </span><a href=\"https://bishopsun1988.wordpress.com/category/%e6%97%a5%e8%ae%b0/\" rel=\"category tag\">日记</a></span><span class=\"tags-links\"><span class=\"screen-reader-text\">标签 </span><a href=\"https://bishopsun1988.wordpress.com/tag/%e7%9b%ae%e6%a0%87/\" rel=\"tag\">目标</a>、<a href=\"https://bishopsun1988.wordpress.com/tag/flag/\" rel=\"tag\">flag</a></span>\t\t\t</footer>\n\n</article>\n\n<div id=\"comments\" class=\"comments-area\">\n\n\t\n\t\n\t\t<div id=\"respond\" class=\"comment-respond\">\n\t\t<h3 id=\"reply-title\" class=\"comment-reply-title\">留下评论 <small><a rel=\"nofollow\" id=\"cancel-comment-reply-link\" href=\"/2021/01/25/%e6%8e%a5%e4%b8%8b%e6%9d%a5%e7%9a%84%e5%b0%8f%e7%9b%ae%e6%a0%87/#respond\" style=\"display:none;\">取消回复</a></small></h3><form action=\"https://bishopsun1988.wordpress.com/wp-comments-post.php\" method=\"post\" id=\"commentform\" class=\"comment-form\">\n\n\n<div class=\"comment-form__verbum transparent\">", "excerpt": "目前粉丝79人，争取这个月底突破100粉丝。 除了目前的考试书PMBOK，研究黄奇帆的《结构性改革》，每日10页", "date": "Mon, 25 Ja"}, {"title": "2021年一月个人复盘", "link": "https://bishopsun1988.wordpress.com/2021/01/25/2021%e5%b9%b4%e4%b8%80%e6%9c%88%e4%b8%aa%e4%ba%ba%e5%a4%8d%e7%9b%98/", "pub_date": "Mon, 25 Jan 2021", "slug": "2021", "content": "<p class=\"wp-block-paragraph\">进入2021年已经快一个月，这个月个人心态发生了不小的变化，主要是个人生活方面吧。</p>\n\n\n\n<ul class=\"wp-block-list\"><li>重启记账习惯</li></ul>\n\n\n\n<p class=\"wp-block-paragraph\">其实2020年有坚持过一段时间的记账习惯，包括我和老婆，每天记录自己用钱的地方，但当时只是单纯的记账，并没有每月或每周进行一次账务的复盘，导致最后年底，看各个账户数据与实际差别很大。在查看多篇他人总结的家庭理财记账文章后，决定2021年开启全新账户以及记账方法，周末跟老婆也“促膝长谈”，商量最新记账方法。</p>\n\n\n\n<p class=\"wp-block-paragraph\">终于，我们开始了流程清晰，且不易搞乱账务的新记账方法，做到每月底一起进行账务复盘，每周结束检查各自账户是否账目匹配实际，这样能最大限度降低流水、账户余额等混乱情况的放生。</p>\n\n\n\n<p class=\"wp-block-paragraph\">到目前为止，账户流水及余额与实际完全匹配，这样方便了我们更好的了解家庭开支情况，为下一步理财投资打下很好的基础。</p>\n\n\n\n<ul class=\"wp-block-list\"><li>开启理财新计划</li></ul>\n\n\n\n<p class=\"wp-block-paragraph\">在了解了家庭实际收支情况后，结合目前资产情况，开启理财新计划。</p>\n\n\n\n<ol class=\"wp-block-list\"><li>每月定投两笔股票型指数基金，作为孩子大学教育金以及未来我俩的养老金，前者坚持定投20年，后者30年。</li><li>留存半年生活费和房租放进银行活期理财，作为风险备用，既保证资金安全又能获取少量收益。</li><li>剩余资金，放入债券型基金，保证年化收益率4%~6%，为近两年买房首付做准备。</li><li>对于每月家庭收入，一半留作生活预算开支继续仿佛银行活期理财，另一半按1:4 定投与债基比列分配。</li></ol>\n\n\n\n<ul class=\"wp-block-list\"><li>开启创业兼职小项目</li></ul>\n\n\n\n<p class=\"wp-block-paragraph\">家庭投资理财，除了节流，开源也很重要，今年打算试着尝试做一些创业兼职小项目，知乎好物与微信视频号，其实发现另一个项目，设计微信红包封面，但需要学习一些设计相关的东西，后期慢慢规划。</p>\n\n\n\n<ol class=\"wp-block-list\"><li>知乎好物，这个很多人其实做得已经很好，而且目前来说，已经被做得不知道未来如何继续走的地步，但可以继续尝试，也不过分追求这一块，能够为自己带来收入也好，不行至少可以提升自己在知乎的影响力，后期肯定会有更好的发展方向。</li><li>微信视频号，当前一直紧跟知识星球一大佬学习更多知识，目前一直在摸索阶段，如何发展该项目，根据他人研究心得，大致有了一点方向。当前任务是不断通过各个渠道推广视频号，将关注量提升到500，然后进行博主认证，同时总结出自己的一套视频拍摄、剪辑、制作、发布的一个SOP，力求一个视频不要占据过多时间。</li><li>微信红包封面设计，对于这个，可能自己首先要花精力学习设计类软件使用，然后研究当前红包封面设计流程，希望能用最短时间设计一个专属于自己的红包封面，而且尽快将视频号认证，这样就能通过红包封面进行视频号推广。</li></ol>\n\n\n\n<ul class=\"wp-block-list\"><li>持续学习PMP</li></ul>\n\n\n\n<p class=\"wp-block-paragraph\">由于疫情影响，原定3月24的PMP考试被不断推迟，先是4月6，又是与6月份的一批同时考试，所以接下来是很煎熬的日子，因为今年的PMP考试时间线拉得太长，若不好好调整去准备，要么太疲惫，要么复习不到位，考试不过。</p>\n\n\n\n<ol class=\"wp-block-list\"><li>调整学习计划以配合延期的考试计划</li><li>调整学习心态，不能太松懈，也不能太疲惫</li></ol>\n\n\n\n<p class=\"wp-block-paragraph\">一月接近尾声，年关也将至，时刻保持一颗学习的头脑，多复盘，不断提升自我，无论是生活、工作还是其他方方面面。不要在乎每天微弱的进步，要懂得复利的价值。</p>\n\n\n\n<p class=\"wp-block-paragraph\"></p>\n<span id=\"wordads-inline-marker\" style=\"display: none;\"></span><div id=\"jp-post-flair\" class=\"sharedaddy\">\n<div id='jp-relatedposts' class='jp-relatedposts' >\n\t<h3 class=\"jp-relatedposts-headline\"><em>相关</em></h3>\n</div></div>\t</div>\n\n\t\n<div class=\"author-info\">\n\t<h2 class=\"author-heading\">发布者</h2>\n\t<div class=\"author-avatar\">\n\t\t<img referrerpolicy=\"no-referrer\" alt='未知 的头像' src='https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=56&#038;d=identicon&#038;r=G' srcset='https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=56&#038;d=identicon&#038;r=G 1x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=84&#038;d=identicon&#038;r=G 1.5x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=112&#038;d=identicon&#038;r=G 2x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=168&#038;d=identicon&#038;r=G 3x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=224&#038;d=identicon&#038;r=G 4x' class='avatar avatar-56' height='56' width='56' decoding='async' />\t</div>\n\n\t<div class=\"author-description\">\n\t\t<h3 class=\"author-title\">Bishop</h3>\n\n\t\t<p class=\"author-bio\">\n\t\t\tLover of Books &amp; Journey &amp; Music\t\t\t<a class=\"author-link\" href=\"https://bishopsun1988.wordpress.com/author/bishopsun1988/\" rel=\"author\">\n\t\t\t\t查看 Bishop 发布的所有文章\t\t\t</a>\n\t\t</p>\n\n\t</div>\n</div>\n\n\t<footer class=\"entry-footer\">\n\t\t<span class=\"posted-on\"><span class=\"screen-reader-text\">发表于 </span><a href=\"https://bishopsun1988.wordpress.com/2021/01/25/2021%e5%b9%b4%e4%b8%80%e6%9c%88%e4%b8%aa%e4%ba%ba%e5%a4%8d%e7%9b%98/\" rel=\"bookmark\"><time class=\"entry-date published updated\" datetime=\"2021-01-25T11:52:48+08:00\">2021-01-25</time></a></span><span class=\"byline\"><span class=\"screen-reader-text\">作者 </span><span class=\"author vcard\"><a class=\"url fn n\" href=\"https://bishopsun1988.wordpress.com/author/bishopsun1988/\">Bishop</a></span></span><span class=\"cat-links\"><span class=\"screen-reader-text\">分类 </span><a href=\"https://bishopsun1988.wordpress.com/category/%e6%97%a5%e8%ae%b0/\" rel=\"category tag\">日记</a></span><span class=\"tags-links\"><span class=\"screen-reader-text\">标签 </span><a href=\"https://bishopsun1988.wordpress.com/tag/%e7%90%86%e8%b4%a2/\" rel=\"tag\">理财</a>、<a href=\"https://bishopsun1988.wordpress.com/tag/%e8%87%aa%e6%88%91%e6%8f%90%e5%8d%87/\" rel=\"tag\">自我提升</a>、<a href=\"https://bishopsun1988.wordpress.com/tag/%e5%88%9b%e4%b8%9a/\" rel=\"tag\">创业</a>、<a href=\"https://bishopsun1988.wordpress.com/tag/%e5%ad%a6%e4%b9%a0/\" rel=\"tag\">学习</a>、<a href=\"https://bishopsun1988.wordpress.com/tag/%e6%80%bb%e7%bb%93/\" rel=\"tag\">总结</a></span>\t\t\t</footer>\n\n</article>\n\n<div id=\"comments\" class=\"comments-area\">\n\n\t\n\t\n\t\t<div id=\"respond\" class=\"comment-respond\">\n\t\t<h3 id=\"reply-title\" class=\"comment-reply-title\">留下评论 <small><a rel=\"nofollow\" id=\"cancel-comment-reply-link\" href=\"/2021/01/25/2021%e5%b9%b4%e4%b8%80%e6%9c%88%e4%b8%aa%e4%ba%ba%e5%a4%8d%e7%9b%98/#respond\" style=\"display:none;\">取消回复</a></small></h3><form action=\"https://bishopsun1988.wordpress.com/wp-comments-post.php\" method=\"post\" id=\"commentform\" class=\"comment-form\">\n\n\n<div class=\"comment-form__verbum transparent\">", "excerpt": "进入2021年已经快一个月，这个月个人心态发生了不小的变化，主要是个人生活方面吧。 其实2020年有坚持过一段时间的记账习惯，包括我和老婆，每天记录自己用钱的地方，但当时只是单纯的记账，并没有每月或每周进行一次账务的复盘，导致最后年底，看各个账户数据与实际差别很大。在查看多篇他人总结的家庭理财记账文", "date": "Mon, 25 Ja"}, {"title": "2020年后的第一次周记", "link": "https://bishopsun1988.wordpress.com/2020/01/13/2020%e5%b9%b4%e5%90%8e%e7%9a%84%e7%ac%ac%e4%b8%80%e6%ac%a1%e5%91%a8%e8%ae%b0/", "pub_date": "Mon, 13 Jan 2020", "slug": "2020", "content": "<p class=\"wp-block-paragraph\">2020后的第一周，有种打鸡血的感觉，新年伊始，为自己定下了一些目标，一些计划，总体说来，执行情况还算良好。</p>\n\n\n\n<p class=\"wp-block-paragraph\">首先在阅读方面，侧重自我提升方面的书籍，根据计划，开始阅读电子版的《掌控谈话》，到周末结束，已阅读过半，从中获益不少，尤其是关于谈判方面。该书作者本身就是FBI有名的谈判专家，通过对在实际谈判中的例子进行总结，得出很多东西是可以应用在平时生活的方方面面，本身与人沟通就是一种谈判，日常生活中无时无刻不在与人谈判中，若是掌握里面的技能，日常沟通定会非常有效。</p>\n\n\n\n<p class=\"wp-block-paragraph\">其次在身体锻炼方面，开始跟着小米健身社区里的课程进行基本锻炼，涉及腰胸腿背部等拉伸热身，先初步对身体各个部位肌肉进行唤醒，然后进行各种强化训练。不得不说，连续练了一周，每天下班回家，时间基本就被锻炼和读书占据，直到睡觉前，感觉充实感十足。</p>\n\n\n\n<p class=\"wp-block-paragraph\">最后在周末，公司开了年会，没想到媳妇儿中了年会一等奖，可喜可贺啊，看来今年本命年我们的日子都会非常幸运，一路顺顺畅畅的。晚上八点及时围观了stormzhang的B站直播，畅谈2020的互联网发展趋势，以及个人可以在哪些领域挖掘副业红利，或者创业项目的方向进行探索。整个看下来，印象最深的应该是反复提到的短视频领域，毕竟2019年短视频已经发力强劲，抖音、快手不断涌现出一大批网红，直播带货也是战功赫赫，算是刷新了我等本着踏实勤恳搬砖混饭者三观，原来还有此等赚钱手段。</p>\n\n\n\n<p class=\"wp-block-paragraph\">很长一段时间，自己也在不断思考，大学毕业工作这么多年，身居二线城市或者像网上说的新一线城市吧，进入一家外贸公司，辛苦经营六年，没混到一官半职也就算了，存款还不够买房，真是够失败的。原因我想，主要还是自己没有一股敢闯敢做的勇气，以及视野太过局限，不懂得如何挖掘新的赚钱模式。可以说自己就是锅里的那只青蛙，一直享受着温水带来的快感，而不懂得多思考进取。</p>\n\n\n\n<p class=\"wp-block-paragraph\">扯远了，来到2020年，期待自己做出更多改变，不能继续以前的混吃等死模式，而是多学习新东西，挖掘副业模式，争取从副业找到一些灵感。</p>\n\n\n\n<p class=\"wp-block-paragraph\">2020年，任总而道远，加油吧，淵坖。</p>\n<span id=\"wordads-inline-marker\" style=\"display: none;\"></span><div id=\"jp-post-flair\" class=\"sharedaddy\">\n<div id='jp-relatedposts' class='jp-relatedposts' >\n\t<h3 class=\"jp-relatedposts-headline\"><em>相关</em></h3>\n</div></div>\t</div>\n\n\t\n<div class=\"author-info\">\n\t<h2 class=\"author-heading\">发布者</h2>\n\t<div class=\"author-avatar\">\n\t\t<img referrerpolicy=\"no-referrer\" alt='未知 的头像' src='https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=56&#038;d=identicon&#038;r=G' srcset='https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=56&#038;d=identicon&#038;r=G 1x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=84&#038;d=identicon&#038;r=G 1.5x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=112&#038;d=identicon&#038;r=G 2x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=168&#038;d=identicon&#038;r=G 3x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=224&#038;d=identicon&#038;r=G 4x' class='avatar avatar-56' height='56' width='56' decoding='async' />\t</div>\n\n\t<div class=\"author-description\">\n\t\t<h3 class=\"author-title\">Bishop</h3>\n\n\t\t<p class=\"author-bio\">\n\t\t\tLover of Books &amp; Journey &amp; Music\t\t\t<a class=\"author-link\" href=\"https://bishopsun1988.wordpress.com/author/bishopsun1988/\" rel=\"author\">\n\t\t\t\t查看 Bishop 发布的所有文章\t\t\t</a>\n\t\t</p>\n\n\t</div>\n</div>\n\n\t<footer class=\"entry-footer\">\n\t\t<span class=\"posted-on\"><span class=\"screen-reader-text\">发表于 </span><a href=\"https://bishopsun1988.wordpress.com/2020/01/13/2020%e5%b9%b4%e5% tetime=\"2020-05-15T13:34:21+08:00\">2020-05-15</time></a></span><span class=\"byline\"><span class=\"screen-reader-text\">作者 </span><span class=\"author vcard\"><a class=\"url fn n\" href=\"https://bishopsun1988.wordpress.com/author/bishopsun1988/\">Bishop</a></span></span><span class=\"cat-links\"><span class=\"screen-reader-text\">分类 </span><a href=\"https://bishopsun1988.wordpress.com/category/%e6%97%a5%e8%ae%b0/\" rel=\"category tag\">日记</a></span>\t\t\t</footer>\n\n</article>\n\n<div id=\"comments\" class=\"comments-area\">\n\n\t\n\t\n\t\t<div id=\"respond\" class=\"comment-respond\">\n\t\t<h3 id=\"reply-title\" class=\"comment-reply-title\">留下评论 <small><a rel=\"nofollow\" id=\"cancel-comment-reply-link\" href=\"/2020/05/04/%e4%bf%a1%e6%81%af%e5%a4%84%e7%90%86/#respond\" style=\"display:none;\">取消回复</a></small></h3><form action=\"https://bishopsun1988.wordpress.com/wp-comments-post.php\" method=\"post\" id=\"commentform\" class=\"comment-form\">\n\n\n<div class=\"comment-form__verbum transparent\">", "excerpt": "Lover of Books &amp; Journey &amp; Music\t\t\t\n\t\t\t\t查看 Bishop 发布的所有文章", "date": "Mon, 04 Ma"}, {"title": "上海电动公交站新充电技术-超级充电弓", "link": "https://bishopsun1988.wordpress.com/2021/01/30/%e4%b8%8a%e6%b5%b7%e7%94%b5%e5%8a%a8%e5%85%ac%e4%ba%a4%e7%ab%99%e6%96%b0%e5%85%85%e7%94%b5%e6%8a%80%e6%9c%af-%e8%b6%85%e7%ba%a7%e5%85%85%e7%94%b5%e5%bc%93/", "pub_date": "Fri, 29 Jan 2021", "slug": "post-3", "content": "<p class=\"wp-block-paragraph\">看来充电技术是有很大进步的，40秒能续航10公里，等于说在每次公交站停留时刻，直接可以充电续航，不用担心电量不足的问题。</p>\n\n\n\n<p class=\"wp-block-paragraph\">突然，产生了一个想法，若以后能将该技术升级改造，在红绿灯上方搞一条线的超级弓，所有电动车都升级成支持这种充电方式，那么电动车续航问题是不是可以解决了。当然这里面会涉及到付费的问题，应该不是什么大问题。</p>\n\n\n\n<p class=\"wp-block-paragraph\">说到这个充电技术，今天摩托罗拉和小米发布了其最新手机充电技术-隔空充电技术，无需手机接触充电设备，数米范围内，手机可边浏览网页边充电。</p>\n\n\n\n<p class=\"wp-block-paragraph\">无线充电技术，大致分三种：电磁感应技术、电磁共振技术、无限射频技术。</p>\n\n\n\n<p class=\"wp-block-paragraph\">摩托罗拉和小米发布的技术属于无限射频技术，原理是利用空间电场作为能量传输媒介。</p>\n\n\n\n<p class=\"wp-block-paragraph\">电磁感应技术：通过电磁线圈进行能量传递和转化，技术成熟，转换效率高，80%，缺点是必须零接触。</p>\n\n\n\n<p class=\"wp-block-paragraph\">电磁共振技术：利用电磁共振技术，比较成熟，转换效率稍低于电磁感应技术，70%，但可以有10cm左右的非接触距离。</p>\n\n\n\n<p class=\"wp-block-paragraph\"></p>\n\n\n\n<figure class=\"wp-block-image\"><img data-attachment-id=\"358\" data-permalink=\"https://bishopsun1988.wordpress.com/2021/01/30/%e4%b8%8a%e6%b5%b7%e7%94%b5%e5%8a%a8%e5%85%ac%e4%ba%a4%e7%ab%99%e6%96%b0%e5%85%85%e7%94%b5%e6%8a%80%e6%9c%af-%e8%b6%85%e7%ba%a7%e5%85%85%e7%94%b5%e5%bc%93/img_2271/\" data-orig-file=\"https://bishopsun1988.wordpress.com/wp-content/uploads/2021/01/img_2271.png\" data-orig-size=\"828,1792\" data-comments-opened=\"1\" data-image-meta=\"{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}\" data-image-title=\"img_2271\" data-image-description=\"\" data-image-caption=\"\" data-large-file=\"https://bishopsun1988.wordpress.com/wp-content/uploads/2021/01/img_2271.png?w=473\" width=\"828\" height=\"1792\" src=\"https://bishopsun1988.wordpress.com/wp-content/uploads/2021/01/img_2271.png\" alt=\"\" class=\"wp-image-358\" srcset=\"https://bishopsun1988.wordpress.com/wp-content/uploads/2021/01/img_2271.png 828w, https://bishopsun1988.wordpress.com/wp-content/uploads/2021/01/img_2271.png?w=69&amp;h=150 69w, https://bishopsun1988.wordpress.com/wp-content/uploads/2021/01/img_2271.png?w=139&amp;h=300 139w, https://bishopsun1988.wordpress.com/wp-content/uploads/2021/01/img_2271.png?w=768&amp;h=1662 768w\" sizes=\"(max-width: 828px) 100vw, 828px\" /></figure>\n<span id=\"wordads-inline-marker\" style=\"display: none;\"></span><div id=\"jp-post-flair\" class=\"sharedaddy\">\n<div id='jp-relatedposts' class='jp-relatedposts' >\n\t<h3 cl %8b%e4%b9%8b%e5%a4%a7%e5%ae%8b%e5%b8%81%e5%88%b6/album_temp_1589159189-1/\" data-orig-file=\"https://bishopsun1988.wordpress.com/wp-content/uploads/2020/05/album_temp_1589159189-1.png\" data-orig-size=\"428,616\" data-comments-opened=\"1\" data-image-meta=\"{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}\" data-image-title=\"album_temp_1589159189-1\" data-image-description=\"\" data-image-caption=\"\" data-large-file=\"https://bishopsun1988.wordpress.com/wp-content/uploads/2020/05/album_temp_1589159189-1.png?w=428\" src=\"https://bishopsun1988.wordpress.com/wp-content/uploads/2020/05/album_temp_1589159189-1.png?w=208&#038;h=300\" class=\"aligncenter size-medium wp-image-215\"   srcset=\"https://bishopsun1988.wordpress.com/wp-content/uploads/2020/05/album_temp_1589159189-1.png 428w, https://bishopsun1988.wordpress.com/wp-content/uploads/2020/05/album_temp_1589159189-1.png?w=104&amp;h=150 104w, https://bishopsun1988.wordpress.com/wp-content/uploads/2020/05/album_temp_1589159189-1.png?w=208&amp;h=300 208w\" sizes=\"(max-width: 428px) 100vw, 428px\"><figcaption id=\"caption-attachment-215\" class=\"wp-caption-text\">封面</figcaption></figure>\n<h3>\n<hr>\n</h3>\n<p>本书有一个例子，特有趣，是关于一个商人想把四川的盐买到陕西，然后从陕西卖盐获取的钱财，拿到京师汴京购置房产。</p>\n<p>该例子在现在看来，流程很简单，从四川批发盐卖到陕西，然后拿着钱去开封买房，简单得不得了。</p>\n<p>然而，回到北宋时期，知道有多复杂吗？</p>\n<p>整个过程是三过长安（陕西），两到京师汴州，一进山西，一到边关，最终才能完成整个交易。</p>\n<p>为何如此？</p>\n<p>那就不得不提到北宋乃至整个宋朝庞大且复杂的围绕金融、国防、盐业等垄断行业的贸易体系，这里面牵扯到了盐业官买官卖，宋代七巧板式的货币制度，鼓励商人为国家做贡献的运输业，票证制度，以及食盐分区销售且禁止跨区域销售的政策。</p>\n<span id=\"wordads-inline-marker\" style=\"display: none;\"></span><div id=\"jp-post-flair\" class=\"sharedaddy\">\n<div id='jp-relatedposts' class='jp-relat af%86%e7%a0%81%e3%80%8b%e4%b9%8b%e4%b8%ad%e5%a4%ae%e9%9b%86%e6%9d%83%e5%ae%98%e5%83%9a%e4%bd%93%e5%88%b6%e5%8f%91%e5%b1%95/album_temp_1589159189/\" data-orig-file=\"https://bishopsun1988.wordpress.com/wp-content/uploads/2020/05/album_temp_1589159189.png\" data-orig-size=\"428,616\" data-comments-opened=\"1\" data-image-meta=\"{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}\" data-image-title=\"album_temp_1589159189\" data-image-description=\"\" data-image-caption=\"\" data-large-file=\"https://bishopsun1988.wordpress.com/wp-content/uploads/2020/05/album_temp_1589159189.png?w=428\" src=\"https://bishopsun1988.wordpress.com/wp-content/uploads/2020/05/album_temp_1589159189.png?w=208&#038;h=300\" class=\"aligncenter size-medium wp-image-211\"   srcset=\"https://bishopsun1988.wordpress.com/wp-content/uploads/2020/05/album_temp_1589159189.png 428w, https://bishopsun1988.wordpress.com/wp-content/uploads/2020/05/album_temp_1589159189.png?w=104&amp;h=150 104w, https://bishopsun1988.wordpress.com/wp-content/uploads/2020/05/album_temp_1589159189.png?w=208&amp;h=300 208w\" sizes=\"(max-width: 428px) 100vw, 428px\"><figcaption id=\"caption-attachment-211\" class=\"wp-caption-text\">封面</figcaption></figure>\n<hr>\n<p>从周朝始，一直采用分封制进行国家的管理，通过分封大小诸侯，使得周王拥有皇帝的权利，然殊不知该皇帝一职徒有虚名，并不能完全控制各诸侯们，因此时各诸侯在各自封地拥有司法／财政／军事三大权利，对皇帝每岁行使朝贺，意味着周皇帝无法获得各诸侯国的财政，因而导致周室财政紧张，军事薄弱，无法打赢任何一场战役。</p>\n<p>春秋战国时期，各诸侯国不断进行变法以图强大，变法，无外乎合理进行经济配置，使得经济效率达到最高，政府获得更多财政收入。战国时期，中原六大国率先变法，使得经济繁荣，百业兴旺。然而，弊端也不断凸显，土地资源狭小，各大诸侯国内利益集团众多，政府无法施行集权程度较高的变法，百业虽兴，然财政力量分散至各个利益集团，且多个诸侯国变法力度不大，无法绕开强大利益集团进行彻底改革，为后期国家崩溃留下荼毒。然秦国与六国不同，其地处西北，距中原六国甚远，民风朴实，变法时间较之六国晚，国内利益集团较少，使得商鞅能快速且彻底推行集权程度高的变法，使得秦君高度集军事／财政／司法权力与一体，拥有强大的中央集权官僚体制，为后期灭六国，完成大一统提供了强有力保障。</p>\n<p>秦灭六国，完成大一统，建立中央集权制的封建王朝，然从古至今，从西方到中方，要想建立大一统的帝国，必须经历两大步骤：第一，军事化武力征服；第二，政治征服，建立统一制度。不管是古埃及帝国，还是波斯第一帝国，抑或马其顿帝国，都未能实现统一帝国的建立，最终都败在了第二步，无法建立统一制度对归附属地进行政治化管理，同样，秦国也败于此，包括后来的楚霸王项羽，在完成灭秦大计后，将七国划分为十九个诸侯国分而治之，项羽成为了当年的齐桓公，不断调停诸侯国间各个纷争，建立起一个“诸侯加霸王”式的统一模式。</p>\n<p>然偏于一隅的刘邦，不安于此，野心勃勃的他与项羽不同，他意图建立大一统的秦后期王朝。精于心计的他，通过兼并／联合／征战各诸侯国，破碎了项羽的统一模式，在杀死心腹大患韩信后，终于创立汉室江山。汉朝虽立，百废待兴。尤其是集权的中央帝国体制，两条路必须走：一，翦除手握重兵的将领；二，发展经济，建立集权的财政体制。高祖毫不犹豫选择先走第一条路，并采用黄老之术，休养生息。辛亏高祖走得早，第一条路走得不远，不深，否则汉室危矣。高度集权的中央帝国体制非一朝一夕能建立完善，需时间逐步施行，经吕后／文帝／景帝多年探索，景帝后期，经过“七王之乱”，终于完成对诸侯国财政／军事／司法的取缔，全数纳入中央政府管理。</p>\n<span id=\"wordads-inline-marker\" style=\"display: none;\"></span><div id=\"jp-post-flair\" class=\"sharedaddy\">\n<div id='jp-relatedposts' class='jp-relatedposts' >\n\t<h3 class=\"jp-relatedposts-headline\"><em>相关</em></h3>\n</div></div>\t</div>\n\n\t\n<div class=\"author-info\">\n\t<h2 class=\"author-heading\">发布者</h2>\n\t<div class=\"author-avatar\">\n\t\t<img referrerpolicy=\"no-referrer\" alt='未知 的头像' src='https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=56&#038;d=identicon&#038;r=G' srcset='https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=56&#038;d=identicon&#038;r=G 1x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=84&#038;d=identicon&#038;r=G 1.5x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=112&#038;d=identicon&#038;r=G 2x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=168&#038;d=identicon&#038;r=G 3x, https://0.gravatar.com/avatar/615f0d18ab2d6b4ad3d937942e0615afabcdd580726ed961ed915db47225381e?s=224&#038;d=identicon&#038;r=G 4x' class='avatar avatar-56' height='56' width='56' decoding='async' />\t</div>\n\n\t<div class=\"author-description\">\n\t\t<h3 class=\"author-title\">Bishop</h3>\n\n\t\t<p class=\"author-b const fmt=d=>{try{const x=new Date(d);return x.getFullYear()+'年'+(x.getMonth()+1)+'月'+x.getDate()+'日'}catch{return d}};
const icon=t=>{const l=t.toLowerCase();
if(l.match(/[书读葡围酒]/))return'fa-book-open';
if(l.match(/跑|运动/))return'fa-running';
if(l.match(/摄|图/))return'fa-camera';

if(l.match(/工作|项目|经理|辞职|目标/))return'fa-briefcase';

if(l.match(/酒/))return'fa-wine-glass';

if(l.match(/旅行|游/))return'fa-plane';
return'fa-pen-fancy';};
document.getElementById('ac').textContent=ARTICLES.length;
document.getElementById('cl').textContent=ARTICLES.length+' 篇';
const grid=document.getElementById('pg');
ARTICLES.forEach((a,i)=>{
const c=document.createElement('a');
c.href='/posts/'+a.slug+'/';
c.className='post-card'+(i===0?' featured':'');
c.innerHTML=`<div class="post-img"><div class="post-img-inner"><i class="fas `+icon(a.title)+`"></i></div></div>
<div class="post-body"><div class="post-tag">`+a.date+`</div>

`+(a.excerpt?`<div class="post-excerpt">`+a.excerpt+`</div>`:``)+`
<div class="post-date">`+fmt(a.date)+`</div>
<div class="post-arrow"><i class="fas fa-arrow-right"></i> 阅读全文</div></div>`;

document.querySelectorAll('.post-card').forEach(c=>obs.observe(c));
